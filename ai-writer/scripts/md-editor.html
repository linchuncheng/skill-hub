<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 实时编辑器 - mdnice 风格</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        .editor-container {
            display: flex;
            height: 100vh;
        }
        
        /* 左侧编辑器 */
        .editor-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e0e0e0;
        }
        
        .editor-header {
            height: 48px;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }
        
        .editor-header h3 {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        
        .editor-header .btn {
            padding: 6px 12px;
            font-size: 12px;
            border: 1px solid #d9d9d9;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .editor-header .btn:hover {
            border-color: #40a9ff;
            color: #40a9ff;
        }
        
        .editor-header .btn-primary {
            background: #07c160;
            color: #fff;
            border-color: #07c160;
        }
        
        .editor-header .btn-primary:hover {
            background: #06ad56;
            border-color: #06ad56;
        }
        
        .editor-header .article-select {
            padding: 6px 10px;
            font-size: 13px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            max-width: 200px;
            min-width: 120px;
        }
        
        .editor-header .article-select:focus {
            outline: none;
            border-color: #40a9ff;
        }
        
        .editor-header .article-select option {
            padding: 4px;
        }
        
        .editor-toolbar .theme-select {
            padding: 4px 8px;
            font-size: 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            min-width: 100px;
        }
        
        .editor-toolbar .theme-select:focus {
            outline: none;
            border-color: #40a9ff;
        }
        
        .editor-toolbar {
            height: 40px;
            background: #fafafa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 4px;
        }
        
        .toolbar-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        
        .toolbar-btn:hover {
            background: #e6f7ff;
            color: #1890ff;
        }
        
        .toolbar-separator {
            width: 1px;
            height: 20px;
            background: #e0e0e0;
            margin: 0 4px;
        }
        
        #markdown-input {
            flex: 1;
            width: 100%;
            padding: 16px;
            border: none;
            outline: none;
            font-family: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace;
            font-size: 14px;
            line-height: 1.8;
            resize: none;
            background: #fafafa;
        }
        
        /* 右侧预览 */
        .preview-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }
        
        .preview-header {
            height: 48px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }
        
        .preview-header h3 {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        
        .preview-toolbar {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
        
        .preview-content {
            flex: 1;
            overflow: auto;
            padding: 20px;
        }
        
        .preview-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            min-height: calc(100vh - 108px);
        }
        
        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .toast.show { opacity: 1; }
        
        /* 拖拽调整宽度 */
        .resizer {
            width: 4px;
            background: #e0e0e0;
            cursor: col-resize;
            transition: background 0.2s;
        }
        
        .resizer:hover {
            background: #1890ff;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .editor-container {
                flex-direction: column;
            }
            .editor-panel, .preview-panel {
                width: 100%;
                height: 50%;
            }
            .resizer {
                width: 100%;
                height: 4px;
                cursor: row-resize;
            }
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <!-- 左侧编辑器 -->
        <div class="editor-panel" id="editorPanel">
            <div class="editor-header">
                <h3>Markdown 编辑</h3>
                <select id="article-select" class="article-select" onchange="loadArticle(this.value)">
                    <option value="">📁 选择文章...</option>
                </select>
                <button class="btn" onclick="refreshArticles()" title="刷新列表">🔄</button>
                <button class="btn" onclick="saveArticle()" title="保存">💾</button>
                <button class="btn" onclick="insertTemplate()">插入模板</button>
                <button class="btn" onclick="clearEditor()">清空</button>
                <button class="btn btn-primary" onclick="copyHtml()">复制 HTML</button>
            </div>
            <div class="editor-toolbar">
                <select id="theme-select" class="theme-select" onchange="changeTheme(this.value)">
                    <option value="">🎨 红绯</option>
                </select>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="insertText('**', '**')" title="粗体"><b>B</b></button>
                <button class="toolbar-btn" onclick="insertText('*', '*')" title="斜体"><i>I</i></button>
                <button class="toolbar-btn" onclick="insertText('# ', '')" title="标题 1">H1</button>
                <button class="toolbar-btn" onclick="insertText('## ', '')" title="标题 2">H2</button>
                <button class="toolbar-btn" onclick="insertText('### ', '')" title="标题 3">H3</button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="insertText('- ', '')" title="无序列表">•</button>
                <button class="toolbar-btn" onclick="insertText('1. ', '')" title="有序列表">1.</button>
                <button class="toolbar-btn" onclick="insertText('> ', '')" title="引用">"</button>
                <button class="toolbar-btn" onclick="insertText('```\n', '\n```')" title="代码块">{ }</button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="insertText('[', '](url)')" title="链接">🔗</button>
                <button class="toolbar-btn" onclick="insertText('![alt](', ')')" title="图片">🖼</button>
                <button class="toolbar-btn" onclick="insertText('---\n', '')" title="分隔线">—</button>
            </div>
            <textarea id="markdown-input" placeholder="在此输入 Markdown 内容...

支持实时预览，右侧会自动渲染"></textarea>
        </div>
        
        <!-- 拖拽条 -->
        <div class="resizer" id="resizer"></div>
        
        <!-- 右侧预览 -->
        <div class="preview-panel" id="previewPanel">
            <div class="preview-header">
                <h3>实时预览</h3>
                <div class="preview-toolbar">
                    <button class="btn" onclick="copyTitle()">复制标题</button>
                    <button class="btn" onclick="copySubtitle()">复制副标题</button>
                    <button class="btn" onclick="copyBody()">复制正文</button>
                </div>
            </div>
            <div class="preview-content">
                <div class="preview-wrapper" id="preview-wrapper">
                    <div id="preview"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast">已复制到剪贴板！</div>

    <script>
        // ==================== 主题样式工厂 ====================
        
        function createThemeStyles(themeData) {
            // 创建一个新的样式对象，合并默认样式和主题样式
            return {
                STRONG_STYLE: themeData.STRONG || MD2HTML.STRONG_STYLE,
                EM_STYLE: themeData.EM || MD2HTML.EM_STYLE,
                A_STYLE: themeData.A || MD2HTML.A_STYLE,
                INLINE_CODE_STYLE: themeData.INLINE_CODE || MD2HTML.INLINE_CODE_STYLE,
                S_STYLE: themeData.S || MD2HTML.S_STYLE,
                P_STYLE: themeData.P || MD2HTML.P_STYLE,
                H1_STYLE: themeData.H1 || MD2HTML.H1_STYLE,
                H1_CONTENT_STYLE: themeData.H1_CONTENT || MD2HTML.H1_CONTENT_STYLE,
                H2_STYLE: themeData.H2 || MD2HTML.H2_STYLE,
                H2_CONTENT_STYLE: themeData.H2_CONTENT || MD2HTML.H2_CONTENT_STYLE,
                H3_STYLE: themeData.H3 || MD2HTML.H3_STYLE,
                H3_CONTENT_STYLE: themeData.H3_CONTENT || MD2HTML.H3_CONTENT_STYLE,
                UL_STYLE: themeData.UL || MD2HTML.UL_STYLE,
                LI_SECTION_STYLE: themeData.LI_SECTION || MD2HTML.LI_SECTION_STYLE,
                BLOCKQUOTE_STYLE: themeData.BLOCKQUOTE || MD2HTML.BLOCKQUOTE_STYLE,
                QUOTE_MARK_STYLE: themeData.QUOTE_MARK ?? null,
                QUOTE_MARK_TEXT: themeData.QUOTE_MARK_TEXT ?? null,
                HR_STYLE: themeData.HR || MD2HTML.HR_STYLE,
                SECTION_STYLE: themeData.SECTION || MD2HTML.SECTION_STYLE,
                TABLE_CONTAINER_STYLE: themeData.TABLE_CONTAINER || MD2HTML.TABLE_CONTAINER_STYLE,
                TABLE_STYLE: themeData.TABLE || MD2HTML.TABLE_STYLE,
                TBODY_STYLE: themeData.TBODY || MD2HTML.TBODY_STYLE,
                TR_STYLE: themeData.TR || MD2HTML.TR_STYLE,
                TR_ALT_STYLE: themeData.TR_ALT || MD2HTML.TR_ALT_STYLE,
                TH_STYLE: themeData.TH || MD2HTML.TH_STYLE,
                TD_STYLE: themeData.TD || MD2HTML.TD_STYLE,
                PRE_STYLE: themeData.PRE || MD2HTML.PRE_STYLE,
                CODE_SPAN_STYLE: themeData.CODE_SPAN || MD2HTML.CODE_SPAN_STYLE,
                CODE_STYLE: themeData.CODE || MD2HTML.CODE_STYLE,
                // 保持方法引用
                convertStrong: MD2HTML.convertStrong,
                convertEm: MD2HTML.convertEm,
                convertInline: MD2HTML.convertInline,
                convertParagraph: MD2HTML.convertParagraph,
                convertH1: MD2HTML.convertH1,
                convertH2: MD2HTML.convertH2,
                convertH3: MD2HTML.convertH3,
                convertListItem: MD2HTML.convertListItem,
                isTableRow: MD2HTML.isTableRow,
                isTableSeparator: MD2HTML.isTableSeparator,
                parseTable: MD2HTML.parseTable,
                convertBlockquote: MD2HTML.convertBlockquote,
                convertHr: MD2HTML.convertHr,
                convertCodeBlock: MD2HTML.convertCodeBlock,
                convert: MD2HTML.convert
            };
        }
        
        // ==================== Markdown 转换器 ====================
        
        const MD2HTML = {
            // 样式常量
            STRONG_STYLE: 'color: rgb(248, 57, 41); font-weight: bold;',
            EM_STYLE: 'color: rgb(248, 57, 41); font-style: italic;',
            A_STYLE: 'color: rgb(248, 57, 41); font-weight: bold; text-decoration-line: none; overflow-wrap: break-word;',
            INLINE_CODE_STYLE: 'color: rgb(248, 57, 41); font-size: 14px; overflow-wrap: break-word; padding: 2px 4px; border-radius: 3px; background-color: rgba(248, 57, 41, 0.08); font-family: \'Operator Mono\', Consolas, Monaco, Menlo, monospace;',
            S_STYLE: 'text-decoration: line-through;',
            P_STYLE: 'color: rgb(53, 53, 53); font-size: 16px; line-height: 1.8em; letter-spacing: 0.04em; text-align: left; text-indent: 0em; margin-top: 0px; margin-bottom: 0px; margin-left: 0px; margin-right: 0px; padding-top: 8px; padding-bottom: 8px; padding-left: 0px; padding-right: 0px;',
            H1_STYLE: 'border-top-color: rgb(248, 57, 41); margin-top: 30px; margin-bottom: 15px; margin-left: 0px; margin-right: 0px; padding-top: 0px; padding-bottom: 0px; padding-left: 0px; padding-right: 0px; align-items: unset; background-attachment: scroll; background-clip: border-box; background-color: unset; background-image: none; background-origin: padding-box; background-position-x: 0%; background-position-y: 0%; background-repeat: no-repeat; background-size: auto; border-top-style: solid; border-bottom-style: none; border-left-style: none; border-right-style: none; border-top-width: 2px; border-bottom-width: 1px; border-left-width: 1px; border-right-width: 1px; border-bottom-color: rgb(0, 0, 0); border-left-color: rgb(0, 0, 0); border-right-color: rgb(0, 0, 0); border-top-left-radius: 0px; border-top-right-radius: 0px; border-bottom-left-radius: 0px; border-bottom-right-radius: 0px; box-shadow: none; display: flex; flex-direction: unset; float: unset; height: auto; justify-content: center; line-height: 1.5em; overflow-x: unset; overflow-y: unset; position: relative; text-align: center; text-shadow: none; transform: none; width: auto; -webkit-box-reflect: unset;',
            H1_CONTENT_STYLE: 'font-size: 20px; color: rgb(255, 255, 255); background-color: rgb(248, 57, 41); line-height: 1.8em; letter-spacing: 0em; align-items: unset; background-attachment: scroll; background-clip: border-box; background-image: none; background-origin: padding-box; background-position-x: 0%; background-position-y: 0%; background-repeat: no-repeat; background-size: auto; border-top-style: none; border-bottom-style: none; border-left-style: none; border-right-style: none; border-top-width: 1px; border-bottom-width: 1px; border-left-width: 1px; border-right-width: 1px; border-top-color: rgb(0, 0, 0); border-bottom-color: rgb(0, 0, 0); border-left-color: rgb(0, 0, 0); border-right-color: rgb(0, 0, 0); border-top-left-radius: 0px; border-top-right-radius: 0px; border-bottom-left-radius: 13px; border-bottom-right-radius: 13px; box-shadow: none; display: block; font-weight: normal; flex-direction: unset; float: unset; height: auto; justify-content: unset; margin-top: 0px; margin-bottom: 0px; margin-left: 0px; margin-right: 0px; overflow-x: unset; overflow-y: unset; padding-top: 3px; padding-bottom: 5px; padding-left: 5px; padding-right: 5px; position: relative; text-align: left; text-indent: 0em; text-shadow: none; transform: none; width: auto; -webkit-box-reflect: unset;',
            H2_STYLE: 'margin-top: 30px; margin-bottom: 15px; margin-left: 0px; margin-right: 0px; align-items: unset; background-attachment: scroll; background-clip: border-box; background-color: unset; background-image: none; background-origin: padding-box; background-position-x: 0%; background-position-y: 0%; background-repeat: no-repeat; background-size: auto; border-top-style: none; border-bottom-style: none; border-left-style: none; border-right-style: none; border-top-width: 1px; border-bottom-width: 1px; border-left-width: 1px; border-right-width: 1px; border-top-color: rgb(0, 0, 0); border-bottom-color: rgb(0, 0, 0); border-left-color: rgb(0, 0, 0); border-right-color: rgb(0, 0, 0); border-top-left-radius: 0px; border-top-right-radius: 0px; border-bottom-left-radius: 0px; border-bottom-right-radius: 0px; box-shadow: none; display: block; flex-direction: unset; float: unset; height: auto; justify-content: unset; line-height: 1.5em; overflow-x: unset; overflow-y: unset; padding-top: 0px; padding-bottom: 0px; padding-left: 0px; padding-right: 0px; position: relative; text-align: left; text-shadow: none; transform: none; width: auto; -webkit-box-reflect: unset;',
            H2_CONTENT_STYLE: 'font-size: 18px; color: rgb(34, 34, 34); line-height: 1.8em; letter-spacing: 0em; padding-top: 0px; padding-bottom: 0px; padding-left: 10px; padding-right: 0px; border-top-style: none; border-bottom-style: none; border-left-style: solid; border-right-style: none; border-top-width: 1px; border-bottom-width: 1px; border-left-width: 5px; border-right-width: 1px; border-top-color: rgb(0, 0, 0); border-bottom-color: rgb(0, 0, 0); border-left-color: rgb(248, 57, 41); border-right-color: rgb(0, 0, 0); border-top-left-radius: 0px; border-top-right-radius: 0px; border-bottom-left-radius: 0px; border-bottom-right-radius: 0px; align-items: unset; background-attachment: scroll; background-clip: border-box; background-color: unset; background-image: none; background-origin: padding-box; background-position-x: 0%; background-position-y: 0%; background-repeat: no-repeat; background-size: auto; box-shadow: none; display: block; font-weight: bold; flex-direction: unset; float: unset; height: auto; justify-content: unset; margin-top: 0px; margin-bottom: 0px; margin-left: 0px; margin-right: 0px; overflow-x: unset; overflow-y: unset; position: relative; text-align: left; text-indent: 0em; text-shadow: none; transform: none; width: auto; -webkit-box-reflect: unset;',
            H3_STYLE: 'margin-top: 30px; margin-bottom: 15px; margin-left: 0px; margin-right: 0px; padding-top: 0px; padding-bottom: 0px; padding-left: 0px; padding-right: 0px; display: flex;',
            H3_CONTENT_STYLE: 'font-size: 16px; color: rgb(0, 0, 0); line-height: 1.5em; letter-spacing: 0em; font-weight: bold; display: block;',
            UL_STYLE: 'list-style-type: disc; margin-top: 8px; margin-bottom: 8px; margin-left: 0px; margin-right: 0px; padding-top: 0px; padding-bottom: 0px; padding-left: 25px; padding-right: 0px; color: rgb(0, 0, 0);',

            TABLE_STYLE: 'display: table; text-align: left;',
            TBODY_STYLE: 'font-size: 16px; line-height: 1.5em; letter-spacing: 0.04em; text-align: left; font-weight: normal; border-top-width: 0px; border-right-width: 0px; border-bottom-width: 0px; border-left-width: 0px;',

            TR_ALT_STYLE: 'color: rgb(53, 53, 53); background-color: rgb(248, 248, 248);',

            TD_STYLE: 'padding-top: 5px; padding-right: 10px; padding-bottom: 5px; padding-left: 10px; min-width: 85px; border-top-style: solid; border-bottom-style: solid; border-left-style: solid; border-right-style: solid; border-top-width: 1px; border-bottom-width: 1px; border-left-width: 1px; border-right-width: 1px; border-top-color: rgba(204, 204, 204, 0.4); border-bottom-color: rgba(204, 204, 204, 0.4); border-left-color: rgba(204, 204, 204, 0.4); border-right-color: rgba(204, 204, 204, 0.4);',
            BLOCKQUOTE_STYLE: 'margin-top: 20px; margin-bottom: 20px; margin-left: 0px; margin-right: 0px; padding-top: 10px; padding-bottom: 10px; padding-left: 20px; padding-right: 10px; border-top-style: none; border-bottom-style: none; border-left-style: none; border-right-style: none; background-color: rgba(0, 0, 0, 0.05); display: block; overflow-x: auto; overflow-y: auto;',
            QUOTE_MARK_STYLE: 'display: block; color: rgb(248, 57, 41); font-size: 28px; line-height: 1.5em; letter-spacing: 0em; text-align: left; font-weight: bold;',
            QUOTE_MARK_TEXT: '"',
            HR_STYLE: 'margin-top: 10px; margin-bottom: 10px; margin-left: 0px; margin-right: 0px; padding-top: 0px; padding-bottom: 0px; padding-left: 0px; padding-right: 0px; border-top-style: none; border-bottom-style: none; border-left-style: none; border-right-style: none; background-image: linear-gradient(90deg, rgba(248, 57, 41, 0) 0%, rgba(248, 57, 41, 0.75) 51.79%, rgba(248, 57, 41, 0) 100%); width: auto; height: 1px;',
            SECTION_STYLE: 'margin-top: 0px; margin-bottom: 0px; margin-left: 0px; margin-right: 0px; padding-top: 0px; padding-bottom: 0px; padding-left: 10px; padding-right: 10px; background-attachment: scroll; background-clip: border-box; background-color: rgba(0, 0, 0, 0); background-image: none; background-origin: padding-box; background-position-x: left; background-position-y: top; background-repeat: no-repeat; background-size: auto; width: auto; font-family: Optima, PingFangSC-light, serif; font-size: 16px; color: rgb(0, 0, 0); line-height: 1.5em; word-spacing: 0em; letter-spacing: 0em; word-break: break-word; overflow-wrap: break-word; text-align: left;',
            PRE_STYLE: 'border-radius: 5px; box-shadow: rgba(0, 0, 0, 0.55) 0px 2px 10px; text-align: left; margin-top: 10px; margin-bottom: 10px; margin-left: 0px; margin-right: 0px; padding-top: 0px; padding-bottom: 0px; padding-left: 0px; padding-right: 0px;',
            CODE_SPAN_STYLE: 'display: block; background: url(https://files.mdnice.com/user/3441/876cad08-0422-409d-bb5a-08afec5da8ee.svg); height: 30px; width: 100%; background-size: 40px; background-repeat: no-repeat; background-color: #282c34; margin-bottom: -7px; border-radius: 5px; background-position: 10px 10px;',
            CODE_STYLE: 'overflow-x: auto; padding: 16px; color: #abb2bf; padding-top: 15px; background: #282c34; border-radius: 5px; display: -webkit-box; font-family: Consolas, Monaco, Menlo, monospace; font-size: 12px;',

            convertStrong(text) {
                return text.replace(/\*\*(.*?)\*\*/g, `<strong style="${this.STRONG_STYLE}">$1</strong>`);
            },

            convertEm(text) {
                return text.replace(/\*(.*?)\*/g, `<em style="${this.EM_STYLE}">$1</em>`);
            },

            convertInline(text) {
                text = this.convertStrong(text);
                text = this.convertEm(text);
                text = text.replace(/~~(.*?)~~/g, `<s style="${this.S_STYLE}">$1</s>`);
                text = text.replace(/`([^`]+)`/g, `<code style="${this.INLINE_CODE_STYLE}">$1</code>`);
                text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, `<a href="$2" style="${this.A_STYLE}">$1</a>`);
                return text;
            },

            convertParagraph(line) {
                const content = this.convertInline(line);
                return `<p data-tool="mdnice编辑器" style="${this.P_STYLE}">${content}</p>`;
            },

            convertH1(line) {
                const content = line.replace(/^#\s*/, '');
                return `<h1 data-tool="mdnice编辑器" style="${this.H1_STYLE}"><span class="prefix" style="display: none;"></span><span class="content" style="${this.H1_CONTENT_STYLE}">${content}</span><span class="suffix" style="display: none;"></span></h1>`;
            },

            convertH2(line) {
                const content = line.replace(/^##\s*/, '');
                return `<h2 data-tool="mdnice编辑器" style="${this.H2_STYLE}"><span class="prefix" style="display: none;"></span><span class="content" style="${this.H2_CONTENT_STYLE}">${content}</span><span class="suffix" style="display: none;"></span></h2>`;
            },

            convertH3(line) {
                const content = line.replace(/^###\s*/, '');
                return `<h3 data-tool="mdnice编辑器" style="${this.H3_STYLE}"><span class="prefix" style="display: none;"></span><span class="content" style="${this.H3_CONTENT_STYLE}">${content}</span><span class="suffix" style="display: none;"></span></h3>`;
            },

            convertListItem(line) {
                const content = line.replace(/^[-*]\s*/, '');
                const converted = this.convertInline(content);
                return `<li><section style="${this.LI_SECTION_STYLE}">${converted}</section></li>`;
            },

            isTableRow(line) {
                return line.startsWith('|') && line.endsWith('|') && line.slice(1, -1).includes('|');
            },

            isTableSeparator(line) {
                const trimmed = line.replace(/\|/g, '').replace(/-/g, '').replace(/:/g, '').trim();
                return line.startsWith('|') && trimmed === '';
            },

            parseTable(lines, startIdx) {
                const tableLines = [];
                let i = startIdx;
                while (i < lines.length && this.isTableRow(lines[i].trim())) {
                    tableLines.push(lines[i].trim());
                    i++;
                }

                if (tableLines.length < 2) return { html: null, endIdx: startIdx + 1 };

                let dataLines;
                if (tableLines.length > 1 && this.isTableSeparator(tableLines[1])) {
                    dataLines = tableLines.slice(2);
                } else {
                    dataLines = tableLines.slice(1);
                }

                const headers = tableLines[0].slice(1, -1).split('|').map(h => h.trim());

                let html = `<section class="table-container" data-tool="mdnice编辑器" style="${this.TABLE_CONTAINER_STYLE}"><table style="${this.TABLE_STYLE}">`;
                
                html += '<thead><tr>';
                headers.forEach(header => {
                    html += `<th style="${this.TH_STYLE}">${this.convertInline(header)}</th>`;
                });
                html += '</tr></thead>';

                html += `<tbody style="${this.TBODY_STYLE}">`;
                dataLines.forEach((dataLine, idx) => {
                    const cells = dataLine.slice(1, -1).split('|').map(c => c.trim());
                    const trStyle = idx % 2 === 0 ? this.TR_STYLE : this.TR_ALT_STYLE;
                    html += `<tr style="${trStyle}">`;
                    cells.forEach(cell => {
                        html += `<td style="${this.TD_STYLE}">${this.convertInline(cell)}</td>`;
                    });
                    html += '</tr>';
                });
                html += '</tbody></table></section>';

                return { html, endIdx: i };
            },

            convertBlockquote(line) {
                const content = line.replace(/^>\s*/, '');
                const converted = this.convertInline(content);
                return `<blockquote class="custom-blockquote multiquote-1" data-tool="mdnice编辑器" style="${this.BLOCKQUOTE_STYLE}"><span style="${this.QUOTE_MARK_STYLE}">"</span><p style="text-indent: 0em; padding-top: 8px; padding-bottom: 8px; padding-left: 0px; padding-right: 0px; color: rgb(53, 53, 53); font-size: 16px; line-height: 1.8em; letter-spacing: 0.04em; text-align: left; font-weight: normal; margin-top: 0px; margin-right: 0px; margin-bottom: 0px; margin-left: 0px;">${converted}</p></blockquote>`;
            },

            convertHr() {
                return `<hr data-tool="mdnice编辑器" style="${this.HR_STYLE}">`;
            },

            isImageLine(line) {
                // 匹配 ![alt](url) 格式，允许前后有空格
                return /^\s*!\[([^\]]*)\]\(([^)]+)\)\s*$/.test(line);
            },

            parseImage(line) {
                const match = line.match(/^\s*!\[([^\]]*)\]\(([^)]+)\)\s*$/);
                if (match) {
                    return { alt: match[1], url: match[2] };
                }
                return null;
            },

            convertImage(alt, url) {
                const IMG_STYLE = 'max-width: 100%; height: auto; display: block; margin: 16px auto; border-radius: 4px;';
                const IMG_CONTAINER_STYLE = 'text-align: center; margin: 20px 0;';
                return `<section data-tool="mdnice编辑器" style="${IMG_CONTAINER_STYLE}"><img src="${url}" alt="${alt}" style="${IMG_STYLE}" loading="lazy"></section>`;
            },

            convertCodeBlock(lines, startIdx) {
                const firstLine = lines[startIdx].trim();
                const lang = firstLine.length > 3 ? firstLine.slice(3).trim() : '';
                
                const codeLines = [];
                let i = startIdx + 1;
                while (i < lines.length) {
                    if (lines[i].trim() === '```') {
                        i++;
                        break;
                    }
                    codeLines.push(lines[i]);
                    i++;
                }

                let codeContent = codeLines.join('\n');
                codeContent = codeContent
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/ /g, '&nbsp;');

                return {
                    html: `<pre class="custom" data-tool="mdnice编辑器" style="${this.PRE_STYLE}"><span style="${this.CODE_SPAN_STYLE}"></span><code class="hljs" style="${this.CODE_STYLE}">${codeContent}<br></code></pre>`,
                    endIdx: i
                };
            },

            convert(mdText, themeName = '', themesList = {}) {
                // 如果有指定主题，使用主题样式
                const styles = (themeName && themesList[themeName]) 
                    ? createThemeStyles(themesList[themeName]) 
                    : this;
                
                const lines = mdText.split('\n');
                const htmlParts = [];
                const sectionStart = `<section id="nice" data-tool="mdnice编辑器" data-website="https://www.mdnice.com" style="${styles.SECTION_STYLE}">`;
                let sectionAppended = false;
                let i = 0;
                let isFirstLine = true;

                // 辅助函数：内联转换
                const convertInline = (text) => {
                    return text
                        .replace(/\*\*(.*?)\*\*/g, `<strong style="${styles.STRONG_STYLE}">$1</strong>`)
                        .replace(/\*(.*?)\*/g, `<em style="${styles.EM_STYLE}">$1</em>`)
                        .replace(/~~(.*?)~~/g, `<s style="${styles.S_STYLE}">$1</s>`)
                        .replace(/`([^`]+)`/g, `<code style="${styles.INLINE_CODE_STYLE}">$1</code>`)
                        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, `<a href="$2" style="${styles.A_STYLE}">$1</a>`);
                };

                // 辅助函数：转换 H1
                const convertH1 = (line) => {
                    const content = line.replace(/^#\s*/, '');
                    return `<h1 data-tool="mdnice编辑器" style="${styles.H1_STYLE}"><span class="prefix" style="display: none;"></span><span class="content" style="${styles.H1_CONTENT_STYLE}">${content}</span><span class="suffix" style="display: none;"></span></h1>`;
                };

                // 辅助函数：转换 H2
                const convertH2 = (line) => {
                    const content = line.replace(/^##\s*/, '');
                    return `<h2 data-tool="mdnice编辑器" style="${styles.H2_STYLE}"><span class="prefix" style="display: none;"></span><span class="content" style="${styles.H2_CONTENT_STYLE}">${content}</span><span class="suffix" style="display: none;"></span></h2>`;
                };

                // 辅助函数：转换 H3
                const convertH3 = (line) => {
                    const content = line.replace(/^###\s*/, '');
                    return `<h3 data-tool="mdnice编辑器" style="${styles.H3_STYLE}"><span class="prefix" style="display: none;"></span><span class="content" style="${styles.H3_CONTENT_STYLE}">${content}</span><span class="suffix" style="display: none;"></span></h3>`;
                };

                // 辅助函数：转换段落
                const convertParagraph = (line) => {
                    const content = convertInline(line);
                    return `<p data-tool="mdnice编辑器" style="${styles.P_STYLE}">${content}</p>`;
                };

                // 辅助函数：转换列表项
                const convertListItem = (line) => {
                    const content = line.replace(/^[-*]\s*/, '');
                    return `<li><section style="${styles.LI_SECTION_STYLE}">${convertInline(content)}</section></li>`;
                };

                // 辅助函数：转换引用块
                // 将引用行数组渲染为嵌套 blockquote（递归处理）
                const renderBlockquoteLines = (bqLines) => {
                    const innerParts = [];
                    let j = 0;
                    let quoteMarkAdded = false;
                    while (j < bqLines.length) {
                        const bqLine = bqLines[j];
                        if (bqLine.startsWith('> ')) {
                            // 二级引用：收集连续的 '> ' 行，递归渲染
                            const nestedLines = [];
                            while (j < bqLines.length && bqLines[j].startsWith('> ')) {
                                nestedLines.push(bqLines[j].replace(/^>\s*/, ''));
                                j++;
                            }
                            innerParts.push(renderBlockquoteLines(nestedLines));
                        } else if (bqLine === '') {
                            j++;
                        } else {
                            if (!quoteMarkAdded && styles.QUOTE_MARK_STYLE) {
                                innerParts.unshift(`<span style="${styles.QUOTE_MARK_STYLE}">${styles.QUOTE_MARK_TEXT || ''}</span>`);
                                quoteMarkAdded = true;
                            }
                            innerParts.push(`<p style="text-indent: 0em; padding-top: 8px; padding-bottom: 8px; padding-left: 0px; padding-right: 0px; color: rgb(53, 53, 53); font-size: 16px; line-height: 1.8em; letter-spacing: 0.04em; text-align: left; font-weight: normal; margin-top: 0px; margin-right: 0px; margin-bottom: 0px; margin-left: 0px;">${convertInline(bqLine)}</p>`);
                            j++;
                        }
                    }
                    return `<blockquote class="custom-blockquote multiquote-1" data-tool="mdnice编辑器" style="${styles.BLOCKQUOTE_STYLE}">${innerParts.join('')}</blockquote>`;
                };

                const convertBlockquote = (lines, startIdx) => {
                    // 收集所有连续的引用行（包括空行）
                    const bqLines = [];
                    let j = startIdx;
                    while (j < lines.length) {
                        const l = lines[j].trim();
                        if (l.startsWith('>')) {
                            bqLines.push(l.replace(/^>\s?/, ''));
                            j++;
                        } else if (l === '' && j + 1 < lines.length && lines[j + 1].trim().startsWith('>')) {
                            bqLines.push('');
                            j++;
                        } else {
                            break;
                        }
                    }
                    return { html: renderBlockquoteLines(bqLines), endIdx: j };
                };

                // 辅助函数：转换分隔线
                const convertHr = () => {
                    return `<hr data-tool="mdnice编辑器" style="${styles.HR_STYLE}">`;
                };

                // 辅助函数：转换代码块
                const convertCodeBlock = (lines, startIdx) => {
                    const codeLines = [];
                    let j = startIdx + 1;
                    while (j < lines.length) {
                        if (lines[j].trim() === '```') {
                            j++;
                            break;
                        }
                        codeLines.push(lines[j]);
                        j++;
                    }
                    let codeContent = codeLines.join('\n')
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/ /g, '&nbsp;');
                    return {
                        html: `<pre class="custom" data-tool="mdnice编辑器" style="${styles.PRE_STYLE}"><span style="${styles.CODE_SPAN_STYLE}"></span><code class="hljs" style="${styles.CODE_STYLE}">${codeContent}<br></code></pre>`,
                        endIdx: j
                    };
                };

                // 辅助函数：检查表格行
                const isTableRow = (line) => {
                    return line.startsWith('|') && line.endsWith('|') && line.slice(1, -1).includes('|');
                };

                // 辅助函数：检查表格分隔符
                const isTableSeparator = (line) => {
                    const trimmed = line.replace(/\|/g, '').replace(/-/g, '').replace(/:/g, '').trim();
                    return line.startsWith('|') && trimmed === '';
                };

                // 辅助函数：解析表格
                const parseTable = (lines, startIdx) => {
                    const tableLines = [];
                    let j = startIdx;
                    while (j < lines.length && isTableRow(lines[j].trim())) {
                        tableLines.push(lines[j].trim());
                        j++;
                    }
                    if (tableLines.length < 2) return { html: null, endIdx: startIdx + 1 };
                    
                    let dataLines;
                    if (tableLines.length > 1 && isTableSeparator(tableLines[1])) {
                        dataLines = tableLines.slice(2);
                    } else {
                        dataLines = tableLines.slice(1);
                    }
                    
                    const headers = tableLines[0].slice(1, -1).split('|').map(h => h.trim());
                    let html = `<section class="table-container" data-tool="mdnice编辑器" style="${styles.TABLE_CONTAINER_STYLE}"><table style="${styles.TABLE_STYLE}">`;
                    html += '<thead><tr>';
                    headers.forEach(header => {
                        html += `<th style="${styles.TH_STYLE}">${convertInline(header)}</th>`;
                    });
                    html += '</tr></thead>';
                    html += `<tbody style="${styles.TBODY_STYLE}">`;
                    dataLines.forEach((dataLine, idx) => {
                        const cells = dataLine.slice(1, -1).split('|').map(c => c.trim());
                        const trStyle = idx % 2 === 0 ? styles.TR_STYLE : styles.TR_ALT_STYLE;
                        html += `<tr style="${trStyle}">`;
                        cells.forEach(cell => {
                            html += `<td style="${styles.TD_STYLE}">${convertInline(cell)}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table></section>';
                    return { html, endIdx: j };
                };

                while (i < lines.length) {
                    const line = lines[i];
                    const stripped = line.trim();

                    if (!stripped) {
                        i++;
                        continue;
                    }

                    if (stripped.startsWith('```')) {
                        const { html, endIdx } = convertCodeBlock(lines, i);
                        htmlParts.push(html);
                        i = endIdx;
                        isFirstLine = false;
                        continue;
                    }

                    if (stripped.startsWith('# ') && !stripped.startsWith('## ')) {
                        const h1Html = convertH1(stripped);
                        htmlParts.push(sectionStart + h1Html);
                        sectionAppended = true;
                        isFirstLine = false;
                        i++;
                        continue;
                    }

                    if (!sectionAppended) {
                        htmlParts.push(sectionStart);
                        sectionAppended = true;
                    }

                    if (stripped.startsWith('>')) {
                        const { html: bqHtml, endIdx: bqEnd } = convertBlockquote(lines, i);
                        htmlParts.push(bqHtml);
                        i = bqEnd;
                        continue;
                    }

                    if (stripped === '---') {
                        htmlParts.push(convertHr());
                        i++;
                        continue;
                    }

                    // 处理图片
                    if (this.isImageLine(stripped)) {
                        const img = this.parseImage(stripped);
                        if (img) {
                            htmlParts.push(this.convertImage(img.alt, img.url));
                        }
                        i++;
                        isFirstLine = false;
                        continue;
                    }

                    if (stripped.startsWith('### ')) {
                        htmlParts.push(convertH3(stripped));
                        i++;
                        continue;
                    }

                    if (stripped.startsWith('## ')) {
                        htmlParts.push(convertH2(stripped));
                        i++;
                        continue;
                    }

                    if (isTableRow(stripped)) {
                        const { html, endIdx } = parseTable(lines, i);
                        if (html) {
                            htmlParts.push(html);
                            i = endIdx;
                            isFirstLine = false;
                            continue;
                        }
                    }

                    if (stripped.startsWith('- ') || stripped.startsWith('* ')) {
                        const listItems = [];
                        while (i < lines.length) {
                            const lineStripped = lines[i].trim();
                            if (lineStripped.startsWith('- ') || lineStripped.startsWith('* ')) {
                                listItems.push(convertListItem(lineStripped));
                                i++;
                            } else {
                                break;
                            }
                        }
                        if (listItems.length > 0) {
                            htmlParts.push(`<ul data-tool="mdnice编辑器" style="${styles.UL_STYLE}">\n${listItems.join('\n')}\n</ul>`);
                            isFirstLine = false;
                            continue;
                        }
                    }

                    if (isFirstLine && stripped.startsWith('**') && stripped.endsWith('**') && stripped.match(/\*\*/g).length === 2) {
                        const content = stripped.replace(/\*\*/g, '');
                        htmlParts.push(`<p data-tool="mdnice编辑器" style="${styles.P_STYLE}"><strong style="${styles.STRONG_STYLE}">${content}</strong></p>`);
                        isFirstLine = false;
                        i++;
                        continue;
                    }

                    htmlParts.push(convertParagraph(stripped));
                    isFirstLine = false;
                    i++;
                }

                htmlParts.push('</section>');
                return htmlParts.join('\n');
            }
        };

        // ==================== 编辑器功能 ====================

        // ==================== 主题管理 ====================

        // ==================== 文章管理 ====================

                    showToast('获取文章列表失败: ' + data.error);

                // 更新下拉框

                        option.value = article.name;

                        option.title = `${article.modifiedTimeStr} · ${(article.size / 1024).toFixed(1)}KB`;
                        articleSelect.appendChild(option);

                // 保持当前选中状态
                if (currentArticleName) {

        async function loadArticle(filename) {
            if (!filename) return;

                const response = await fetch('/api/article?name=' + encodeURIComponent(filename));
                const data = await response.json();

                showToast('已加载: ' + filename);

                if (!name) return;
                currentArticleName = name.endsWith('.md') ? name : name + '.md';

            try {
                const response = await fetch('/api/save', {

            preview.innerHTML = html;
        }

        // 工具栏功能
        function insertText(before, after) {
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const text = input.value;
            const selected = text.substring(start, end);
            
            input.value = text.substring(0, start) + before + selected + after + text.substring(end);
            input.focus();
            input.setSelectionRange(start + before.length, start + before.length + selected.length);
            updatePreview();
        }

        function insertTemplate() {
            input.value = defaultTemplate;
            currentArticleName = '';
            articleSelect.value = '';
            updatePreview();
            showToast('已插入模板');
        }

        function clearEditor() {
            if (confirm('确定要清空编辑器吗？')) {
                input.value = '';
                updatePreview();
            }
        }

        // 复制功能
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 将图片转换为 base64
        async function imageToBase64(imgUrl) {
            try {
                const response = await fetch(imgUrl);
                const blob = await response.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (err) {
                console.error('图片转换失败:', imgUrl, err);
                return null;
            }
        }

        // 处理容器中的图片，将 src 转换为 base64
        async function processImagesToBase64(container) {
            const images = container.querySelectorAll('img');
            for (const img of images) {
                const src = img.getAttribute('src');
                if (!src) continue;
                
                let fullUrl = null;
                
                // 处理绝对路径 http:// 或 https://
                if (src.startsWith('http://') || src.startsWith('https://')) {
                    fullUrl = src;
                }
                // 处理以 / 开头的路径
                else if (src.startsWith('/')) {
                    fullUrl = location.origin + src;
                }
                // 处理相对路径 ./images/xxx
                else if (src.startsWith('./')) {
                    // 将 ./images/xxx 转换为完整的 URL
                    fullUrl = location.origin + src.replace(/^\.\//, '/');
                }
                
                if (fullUrl) {
                    const base64 = await imageToBase64(fullUrl);
                    if (base64) {
                        img.setAttribute('src', base64);
                    }
                }
            }
        }

        function copyHtml() {
            const html = MD2HTML.convert(input.value);
            navigator.clipboard.writeText(html).then(() => {
                showToast('HTML 已复制到剪贴板');
            }).catch(() => {
                showToast('复制失败');
            });
        }

        function copyTitle() {
            const h1 = preview.querySelector('h1');
            if (h1) {
                copyElement(h1, '标题已复制');
            } else {
                showToast('未找到标题');
            }
        }

        function copySubtitle() {
            const h2 = preview.querySelector('h2');
            if (h2) {
                copyElement(h2, '副标题已复制');
            } else {
                showToast('未找到副标题');
            }
        }

        async function copyBody() {
            const section = preview.querySelector('section');
            if (!section) {
                showToast('无正文内容');
                return;
            }

            const allChildren = section.querySelectorAll(':scope > *');
            let foundH2 = false;
            const elementsToCopy = [];

            allChildren.forEach(child => {
                const tagName = child.tagName.toUpperCase();
                if (tagName === 'H1') return;
                if (tagName === 'H2' && !foundH2) {
                    foundH2 = true;
                    return;
                }
                elementsToCopy.push(child);
            });

            if (elementsToCopy.length === 0) {
                showToast('无正文内容');
                return;
            }

            showToast('正在处理图片...');

            // 创建临时容器来包装要复制的内容
            const tempDiv = document.createElement('div');
            tempDiv.style.cssText = 'position: absolute; left: -9999px; top: -9999px;';
            elementsToCopy.forEach(el => tempDiv.appendChild(el.cloneNode(true)));
            document.body.appendChild(tempDiv);

            // 将图片转换为 base64
            await processImagesToBase64(tempDiv);

            try {
                // 使用 Clipboard API 复制富文本
                const htmlContent = tempDiv.innerHTML;
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const textBlob = new Blob([tempDiv.innerText], { type: 'text/plain' });
                
                const clipboardItem = new ClipboardItem({
                    'text/html': blob,
                    'text/plain': textBlob
                });

                await navigator.clipboard.write([clipboardItem]);
                showToast('正文已复制（含图片）');
            } catch (err) {
                // 降级方案：使用传统的复制方法
                const selection = window.getSelection();
                const range = document.createRange();
                range.selectNodeContents(tempDiv);
                selection.removeAllRanges();
                selection.addRange(range);

                try {
                    document.execCommand('copy');
                    showToast('正文已复制');
                } catch (e) {
                    showToast('复制失败');
                }
                selection.removeAllRanges();
            } finally {
                document.body.removeChild(tempDiv);
            }
        }

        async function copyElement(element, successMessage) {
            showToast('正在处理图片...');

            // 创建临时容器
            const tempDiv = document.createElement('div');
            tempDiv.style.cssText = 'position: absolute; left: -9999px; top: -9999px;';
            tempDiv.appendChild(element.cloneNode(true));
            document.body.appendChild(tempDiv);

            // 将图片转换为 base64
            await processImagesToBase64(tempDiv);

            try {
                // 使用 Clipboard API 复制富文本
                const htmlContent = tempDiv.innerHTML;
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const textBlob = new Blob([tempDiv.innerText], { type: 'text/plain' });
                
                const clipboardItem = new ClipboardItem({
                    'text/html': blob,
                    'text/plain': textBlob
                });

                await navigator.clipboard.write([clipboardItem]);
                showToast(successMessage + '（含格式）');
            } catch (err) {
                // 降级方案：使用传统的复制方法
                const selection = window.getSelection();
                const range = document.createRange();
                range.selectNodeContents(tempDiv);
                selection.removeAllRanges();
                selection.addRange(range);

                try {
                    document.execCommand('copy');
                    showToast(successMessage);
                } catch (e) {
                    showToast('复制失败');
                }
                selection.removeAllRanges();
            } finally {
                document.body.removeChild(tempDiv);
            }
        }

        // 拖拽调整宽度
        const resizer = document.getElementById('resizer');
        const editorPanel = document.getElementById('editorPanel');
        const previewPanel = document.getElementById('previewPanel');
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerWidth = document.querySelector('.editor-container').offsetWidth;
            const newEditorWidth = (e.clientX / containerWidth) * 100;
            if (newEditorWidth > 20 && newEditorWidth < 80) {
                editorPanel.style.width = newEditorWidth + '%';
                previewPanel.style.width = (100 - newEditorWidth) + '%';
            }
        });

        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'default';
        });

        // 键盘快捷键
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = input.selectionStart;
                const end = input.selectionEnd;
                input.value = input.value.substring(0, start) + '    ' + input.value.substring(end);
                input.setSelectionRange(start + 4, start + 4);
                updatePreview();
            }
        });
    </script>
</body>
</html>
