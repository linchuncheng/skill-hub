<line class="connector-line-solid" x1="535" y1="450" x2="740" y2="450" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 3.4s;"/>
<text class="ts connector-text" x="637" y="444" text-anchor="middle" dominant-baseline="central" fill="#791F1F" style="animation-delay: 3.5s;">7: 创建退货入库单</text>

<!-- 返回 7 -->
<line class="connector-line-dashed" x1="740" y1="480" x2="535" y2="480" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 3.6s;"/>

<!-- 返回 6 -->
<line class="connector-line-dashed" x1="535" y1="510" x2="415" y2="510" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 3.7s;"/>
<text class="ts connector-text" x="475" y="504" text-anchor="middle" dominant-baseline="central" fill="#633806" style="animation-delay: 3.8s;">6.1: 返回退货地址</text>

<!-- 消息 8: 售后中心 -> 用户 (通知) -->
<line class="connector-line-dashed" x1="415" y1="540" x2="65" y2="540" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 3.9s;"/>
<text class="ts connector-text" x="240" y="534" text-anchor="middle" dominant-baseline="central" fill="#3C3489" style="animation-delay: 4.0s;">8: 异步通知用户退货地址</text>

<!-- 分隔线: 退货入库阶段 -->
<line class="layer-frame" x1="40" y1="565" x2="370" y2="565" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" stroke-opacity="0.5" style="animation-delay: 4.1s;"/>
<text class="ts layer-frame" x="390" y="565" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 4.1s;">退货入库阶段</text>
<line class="layer-frame" x1="410" y1="565" x2="760" y2="565" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" stroke-opacity="0.5" style="animation-delay: 4.1s;"/>

<!-- 消息 9: WMS -> DB (验货完成) -->
<line class="connector-line-solid" x1="535" y1="590" x2="740" y2="590" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 4.2s;"/>
<text class="ts connector-text" x="637" y="584" text-anchor="middle" dominant-baseline="central" fill="#791F1F" style="animation-delay: 4.3s;">9: 更新验货结果</text>

<!-- 消息 10: WMS -> 售后中心 -->
<line class="connector-line-solid" x1="535" y1="620" x2="415" y2="620" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 4.4s;"/>
<text class="ts connector-text" x="475" y="614" text-anchor="middle" dominant-baseline="central" fill="#633806" style="animation-delay: 4.5s;">10: 回传验货结果</text>

