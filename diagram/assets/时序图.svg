<svg width="100%" viewBox="0 0 780 720" xmlns="http://www.w3.org/2000/svg" style="background-color: white;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #444441; }
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-red rect { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    
    /* 动画定义 */
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeInLine {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    
    /* 动画类 */
    .layer-frame { opacity: 0; animation: fadeIn 0.3s ease-out forwards; }
    .component-card { opacity: 0; transform-box: fill-box; transform-origin: center; animation: popIn 0.4s ease-out forwards; }
    .connector-line-solid { opacity: 0; animation: fadeInLine 0.4s ease-out forwards; }
    .connector-line-dashed { opacity: 0; animation: fadeInLine 0.4s ease-out forwards; }
    .connector-text { opacity: 0; animation: fadeIn 0.3s ease-out forwards; }
  </style>
</defs>

<text class="th layer-frame" x="390" y="24" text-anchor="middle" dominant-baseline="central" font-size="15" style="animation-delay: 0s;">订单售后时序图 - 退货退款流程</text>

<!-- 参与者 -->
<g class="c-gray component-card" style="animation-delay: 0.3s;"><rect x="30" y="44" width="70" height="36" rx="18" stroke-width="0.5"/>
  <text class="ts" x="65" y="62" text-anchor="middle" dominant-baseline="central">👤 用户</text></g>
<g class="c-blue component-card" style="animation-delay: 0.4s;"><rect x="130" y="44" width="90" height="36" rx="8" stroke-width="0.5"/>
  <text class="ts" x="175" y="62" text-anchor="middle" dominant-baseline="central">🌐 前端应用</text></g>
<g class="c-teal component-card" style="animation-delay: 0.5s;"><rect x="250" y="44" width="90" height="36" rx="8" stroke-width="0.5"/>
  <text class="ts" x="295" y="62" text-anchor="middle" dominant-baseline="central">⚙️ 订单服务</text></g>
<g class="c-purple component-card" style="animation-delay: 0.6s;"><rect x="370" y="44" width="90" height="36" rx="8" stroke-width="0.5"/>
  <text class="ts" x="415" y="62" text-anchor="middle" dominant-baseline="central">🔄 售后中心</text></g>
<g class="c-amber component-card" style="animation-delay: 0.7s;"><rect x="490" y="44" width="90" height="36" rx="8" stroke-width="0.5"/>
  <text class="ts" x="535" y="62" text-anchor="middle" dominant-baseline="central">🏭 WMS仓储</text></g>
<g class="c-coral component-card" style="animation-delay: 0.8s;"><rect x="610" y="44" width="70" height="36" rx="8" stroke-width="0.5"/>
  <text class="ts" x="645" y="62" text-anchor="middle" dominant-baseline="central">💳 支付</text></g>
<g class="c-red component-card" style="animation-delay: 0.9s;"><rect x="710" y="44" width="60" height="36" rx="8" stroke-width="0.5"/>
  <text class="ts" x="740" y="62" text-anchor="middle" dominant-baseline="central">🗄️ DB</text></g>

<!-- 生命线 -->
<line class="layer-frame" x1="65" y1="80" x2="65" y2="680" stroke="#888780" stroke-width="1" stroke-dasharray="6 4" style="animation-delay: 1.0s;"/>
<line class="layer-frame" x1="175" y1="80" x2="175" y2="680" stroke="#888780" stroke-width="1" stroke-dasharray="6 4" style="animation-delay: 1.0s;"/>
<line class="layer-frame" x1="295" y1="80" x2="295" y2="680" stroke="#888780" stroke-width="1" stroke-dasharray="6 4" style="animation-delay: 1.0s;"/>
<line class="layer-frame" x1="415" y1="80" x2="415" y2="680" stroke="#888780" stroke-width="1" stroke-dasharray="6 4" style="animation-delay: 1.0s;"/>
<line class="layer-frame" x1="535" y1="80" x2="535" y2="680" stroke="#888780" stroke-width="1" stroke-dasharray="6 4" style="animation-delay: 1.0s;"/>
<line class="layer-frame" x1="645" y1="80" x2="645" y2="680" stroke="#888780" stroke-width="1" stroke-dasharray="6 4" style="animation-delay: 1.0s;"/>
<line class="layer-frame" x1="740" y1="80" x2="740" y2="680" stroke="#888780" stroke-width="1" stroke-dasharray="6 4" style="animation-delay: 1.0s;"/>

<!-- 消息 1: 用户 -> 前端 -->
<line class="connector-line-solid" x1="65" y1="100" x2="175" y2="100" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 1.1s;"/>
<text class="ts connector-text" x="120" y="94" text-anchor="middle" dominant-baseline="central" fill="#0C447C" style="animation-delay: 1.2s;">1: 申请售后</text>

