<line class="connector-line-solid" x1="175" y1="130" x2="295" y2="130" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 1.3s;"/>
<text class="ts connector-text" x="235" y="124" text-anchor="middle" dominant-baseline="central" fill="#085041" style="animation-delay: 1.4s;">2: 校验订单状态</text>

<!-- 消息 3: 订单服务 -> DB -->
<line class="connector-line-solid" x1="295" y1="160" x2="740" y2="160" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 1.5s;"/>
<text class="ts connector-text" x="517" y="154" text-anchor="middle" dominant-baseline="central" fill="#791F1F" style="animation-delay: 1.6s;">3: 查询订单信息</text>

<!-- 返回 3 -->
<line class="connector-line-dashed" x1="740" y1="190" x2="295" y2="190" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 1.7s;"/>
<text class="ts connector-text" x="517" y="184" text-anchor="middle" dominant-baseline="central" fill="#791F1F" style="animation-delay: 1.8s;">3.1: 返回订单数据</text>

<!-- 返回 2 -->
<line class="connector-line-dashed" x1="295" y1="220" x2="175" y2="220" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 1.9s;"/>
<text class="ts connector-text" x="235" y="214" text-anchor="middle" dominant-baseline="central" fill="#085041" style="animation-delay: 2.0s;">2.1: 校验通过</text>

