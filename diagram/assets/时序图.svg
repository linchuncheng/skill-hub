<line class="connector-line-solid" x1="175" y1="250" x2="415" y2="250" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.1s;"/>
<text class="ts connector-text" x="295" y="244" text-anchor="middle" dominant-baseline="central" fill="#3C3489" style="animation-delay: 2.2s;">4: 创建售后单</text>

<!-- 消息 5: 售后中心 -> DB -->
<line class="connector-line-solid" x1="415" y1="280" x2="740" y2="280" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.3s;"/>
