<line class="connector-line-solid" x1="415" y1="650" x2="645" y2="650" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 4.6s;"/>
<text class="ts connector-text" x="530" y="644" text-anchor="middle" dominant-baseline="central" fill="#3C3489" style="animation-delay: 4.7s;">11: 发起退款</text>

<!-- 图例 -->
<line class="layer-frame" x1="40" y1="685" x2="380" y2="685" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" stroke-opacity="0.35" style="animation-delay: 4.8s;"/>
<text class="ts layer-frame" x="200" y="700" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 4.9s;">实线 = 同步调用 | 虚线 = 异步消息/返回</text>
<line class="layer-frame" x1="400" y1="685" x2="760" y2="685" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" stroke-opacity="0.35" style="animation-delay: 4.8s;"/>

</svg>