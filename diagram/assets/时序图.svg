<!-- 返回 4 -->
<line class="connector-line-dashed" x1="415" y1="340" x2="175" y2="340" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.7s;"/>
<text class="ts connector-text" x="295" y="334" text-anchor="middle" dominant-baseline="central" fill="#3C3489" style="animation-delay: 2.8s;">4.1: 售后单创建成功</text>

<!-- 返回 1 -->
<line class="connector-line-dashed" x1="175" y1="370" x2="65" y2="370" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.9s;"/>
<text class="ts connector-text" x="120" y="364" text-anchor="middle" dominant-baseline="central" fill="#0C447C" style="animation-delay: 3.0s;">1.1: 展示售后单</text>

<!-- 分隔线: 审核阶段 -->
<line class="layer-frame" x1="40" y1="395" x2="370" y2="395" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" stroke-opacity="0.5" style="animation-delay: 3.1s;"/>
<text class="ts layer-frame" x="390" y="395" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 3.1s;">审核阶段</text>
<line class="layer-frame" x1="410" y1="395" x2="760" y2="395" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" stroke-opacity="0.5" style="animation-delay: 3.1s;"/>

<!-- 消息 6: 售后中心 -> WMS (推送退货单) -->
<line class="connector-line-solid" x1="415" y1="420" x2="535" y2="420" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 3.2s;"/>
<text class="ts connector-text" x="475" y="414" text-anchor="middle" dominant-baseline="central" fill="#633806" style="animation-delay: 3.3s;">6: 推送退货单</text>

