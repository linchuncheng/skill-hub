<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 760" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <!-- 箭头标记：小巧三角形，refX控制箭头离终点距离 -->
    <marker id="arrow" viewBox="0 0 8 8" refX="7.5" refY="4"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 L 1 4 Z" fill="#999"/>
    </marker>
  </defs>
  <style>
    .legend-text { font-size: 10px; fill: #555; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .layer-frame { opacity: 0; animation: fadeIn 0.4s ease-out forwards; }
    .component-card { opacity: 0; animation: fadeIn 0.5s ease-out forwards; }
    .connector-line { opacity: 0; animation: fadeIn 0.4s ease-out forwards; }
  </style>
  <rect width="660" height="760" fill="#f8f9fa"/>
  <text x="330" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">RBAC领域模型图</text>
  <g transform="translate(40, 30)" class="layer-frame">
    <rect x="0" y="0" width="12" height="12" fill="#fff9c4" stroke="#f9a825"/>
    <text x="16" y="10" class="legend-text">角色</text>
    <rect x="60" y="0" width="12" height="12" fill="#f1f8e9" stroke="#689f38"/>
    <text x="76" y="10" class="legend-text">事物</text>
    <rect x="120" y="0" width="12" height="12" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="136" y="10" class="legend-text">配置</text>
    <rect x="180" y="0" width="12" height="12" fill="#fce4ec" stroke="#e91e63"/>
    <text x="196" y="10" class="legend-text">单据</text>
  </g>
  <rect x="40" y="60" width="580" height="680" rx="4" fill="#fff" stroke="#333" stroke-width="2" class="layer-frame" style="animation-delay: 0.1s"/>
  <path d="M40 60 L100 60 L100 81 Q100 89 92 89 L40 89 Z" fill="#333" class="layer-frame" style="animation-delay: 0.15s"/>
  <text x="70.0" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" class="layer-frame" style="animation-delay: 0.15s">RBAC</text>
  <!-- 模型卡片 -->
  <g transform="translate(60, 110)" class="component-card" style="animation-delay: 0.3s">
    <rect x="0" y="0" width="150" height="125" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    <text x="75.0" y="16" text-anchor="middle" font-size="12" font-weight="bold">租户</text>
    <text x="75.0" y="28" text-anchor="middle" font-size="10" fill="#666">Tenant</text>
    <line x1="8" y1="35" x2="142" y2="35" stroke="#f9a825" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="8" y="50" font-size="10" fill="#555">+ 租户编码</text>
    <text x="8" y="63" font-size="10" fill="#555">+ 租户名称</text>
    <text x="8" y="76" font-size="10" fill="#555">+ 租户Logo图片链接</text>
    <text x="8" y="89" font-size="10" fill="#555">+ 联系人</text>
    <text x="8" y="102" font-size="10" fill="#555">+ 联系电话</text>
    <text x="8" y="115" font-size="10" fill="#555">+ 状态</text>
  </g>
  <g transform="translate(60, 280)" class="component-card" style="animation-delay: 0.35s">
    <rect x="0" y="0" width="150" height="231" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    <text x="75.0" y="16" text-anchor="middle" font-size="12" font-weight="bold">用户</text>
    <text x="75.0" y="28" text-anchor="middle" font-size="10" fill="#666">User</text>
    <line x1="8" y1="35" x2="142" y2="35" stroke="#f9a825" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="8" y="50" font-size="10" fill="#555">+ 租户ID</text>
    <text x="8" y="63" font-size="10" fill="#555">+ 用户名</text>
    <text x="8" y="76" font-size="10" fill="#555">+ 密码</text>
    <text x="8" y="89" font-size="10" fill="#555">+ 真实姓名</text>
    <text x="8" y="102" font-size="10" fill="#555">+ 头像图片链接</text>
    <text x="8" y="115" font-size="10" fill="#555">+ 手机号</text>
    <text x="8" y="128" font-size="10" fill="#555">+ 邮箱</text>
    <text x="8" y="141" font-size="10" fill="#555">+ 备注</text>
    <text x="8" y="154" font-size="10" fill="#555">+ 状态</text>
    <text x="8" y="167" font-size="10" fill="#555">+ 用户类型</text>
    <text x="8" y="180" font-size="10" fill="#555">T 用户角色集合</text>
    <line x1="8" y1="193" x2="142" y2="193" stroke="#f9a825" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="8" y="205" font-size="10" fill="#555">+ 登录()</text>
    <text x="8" y="218" font-size="10" fill="#555">+ 分配角色()</text>
  </g>
  <g transform="translate(255, 280)" class="component-card" style="animation-delay: 0.4s">
    <rect x="0" y="0" width="150" height="192" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    <text x="75.0" y="16" text-anchor="middle" font-size="12" font-weight="bold">角色</text>
    <text x="75.0" y="28" text-anchor="middle" font-size="10" fill="#666">Role</text>
    <line x1="8" y1="35" x2="142" y2="35" stroke="#f9a825" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="8" y="50" font-size="10" fill="#555">+ 租户ID</text>
    <text x="8" y="63" font-size="10" fill="#555">+ 角色编码</text>
    <text x="8" y="76" font-size="10" fill="#555">+ 角色名称</text>
    <text x="8" y="89" font-size="10" fill="#555">+ 排序</text>
    <text x="8" y="102" font-size="10" fill="#555">+ 状态</text>
    <text x="8" y="115" font-size="10" fill="#555">+ 备注</text>
    <text x="8" y="128" font-size="10" fill="#555">T 角色权限集合</text>
    <text x="8" y="141" font-size="10" fill="#555">T 角色菜单集合</text>
    <line x1="8" y1="154" x2="142" y2="154" stroke="#f9a825" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="8" y="166" font-size="10" fill="#555">+ 分配权限()</text>
    <text x="8" y="179" font-size="10" fill="#555">+ 分配菜单()</text>
  </g>
  <g transform="translate(450, 280)" class="component-card" style="animation-delay: 0.45s">
    <rect x="0" y="0" width="150" height="112" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="75.0" y="16" text-anchor="middle" font-size="12" font-weight="bold">权限</text>
    <text x="75.0" y="28" text-anchor="middle" font-size="10" fill="#666">Permission</text>
    <line x1="8" y1="35" x2="142" y2="35" stroke="#1976d2" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="8" y="50" font-size="10" fill="#555">+ 权限码</text>
    <text x="8" y="63" font-size="10" fill="#555">+ 权限名称</text>
    <text x="8" y="76" font-size="10" fill="#555">+ 资源类型</text>
    <text x="8" y="89" font-size="10" fill="#555">+ 排序</text>
    <text x="8" y="102" font-size="10" fill="#555">+ 状态</text>
  </g>
  <g transform="translate(255, 556)" class="component-card" style="animation-delay: 0.5s">
    <rect x="0" y="0" width="150" height="151" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="75.0" y="16" text-anchor="middle" font-size="12" font-weight="bold">菜单</text>
    <text x="75.0" y="28" text-anchor="middle" font-size="10" fill="#666">Menu</text>
    <line x1="8" y1="35" x2="142" y2="35" stroke="#1976d2" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="8" y="50" font-size="10" fill="#555">+ 菜单名称</text>
    <text x="8" y="63" font-size="10" fill="#555">+ 路由路径</text>
    <text x="8" y="76" font-size="10" fill="#555">+ 前端组件路径</text>
    <text x="8" y="89" font-size="10" fill="#555">+ 图标</text>
    <text x="8" y="102" font-size="10" fill="#555">+ 排序</text>
    <text x="8" y="115" font-size="10" fill="#555">+ 是否可见</text>
    <text x="8" y="128" font-size="10" fill="#555">+ 权限码</text>
    <text x="8" y="141" font-size="10" fill="#555">+ 状态</text>
  </g>
  <g transform="translate(60, 556)" class="component-card" style="animation-delay: 0.55s">
    <rect x="0" y="0" width="150" height="164" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5"/>
    <text x="75.0" y="16" text-anchor="middle" font-size="12" font-weight="bold">登录日志</text>
    <text x="75.0" y="28" text-anchor="middle" font-size="10" fill="#666">LoginLog</text>
    <line x1="8" y1="35" x2="142" y2="35" stroke="#e91e63" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="8" y="50" font-size="10" fill="#555">+ 租户ID</text>
    <text x="8" y="63" font-size="10" fill="#555">+ 用户名</text>
    <text x="8" y="76" font-size="10" fill="#555">+ 登录IP</text>
    <text x="8" y="89" font-size="10" fill="#555">+ 登录地点</text>
    <text x="8" y="102" font-size="10" fill="#555">+ 浏览器</text>
    <text x="8" y="115" font-size="10" fill="#555">+ 操作系统</text>
    <text x="8" y="128" font-size="10" fill="#555">+ 登录状态</text>
    <text x="8" y="141" font-size="10" fill="#555">+ 提示消息</text>
    <text x="8" y="154" font-size="10" fill="#555">+ 登录时间</text>
  </g>
  <!-- 连线 -->
  <polyline points="135.0,235 135.0,280" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow)" class="connector-line" style="animation-delay: 0.65s"/>
  <polyline points="210,172.5 330.0,172.5 330.0,280" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow)" class="connector-line" style="animation-delay: 0.7000000000000001s"/>
  <polyline points="210,395.5 230.0,395.5 230.0,376.0 255,376.0" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow)" class="connector-line" style="animation-delay: 0.75s"/>
  <polyline points="405,376.0 425.0,376.0 425.0,336.0 450,336.0" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow)" class="connector-line" style="animation-delay: 0.8s"/>
  <polyline points="330.0,472 330.0,556" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow)" class="connector-line" style="animation-delay: 0.8500000000000001s"/>
  <polyline points="135.0,511 135.0,556" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow)" class="connector-line" style="animation-delay: 0.9s"/>
</svg>