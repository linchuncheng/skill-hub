<svg width="100%" viewBox="0 0 680 790" xmlns="http://www.w3.org/2000/svg" style="background-color: white;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
  </filter>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #444441; }
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-red rect { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    
    /* 动画定义 */
    .layer-frame {
      opacity: 0;
      animation: fadeIn 0.3s ease-out forwards;
    }
    
    .component-card {
      opacity: 0;
      transform-origin: center;
      animation: popIn 0.4s ease-out forwards;
    }
    
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    .connector-line {
      opacity: 0;
      animation: fadeInLine 0.4s ease-out forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    
    @keyframes fadeInLine {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    
    .legend {
      opacity: 0;
      animation: fadeIn 0.5s ease-out 2s forwards;
    }
  </style>
</defs>

<text class="th" x="340" y="24" text-anchor="middle" dominant-baseline="central" font-size="15">SCM · 供应链一体化平台</text>

<!-- 用户层：5 pills w=104 gap=17 x: 52,173,302,423,534 -->
