<svg width="100%" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" style="background-color: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .th { font-size: 13px; font-weight: 500; }
      .ts { font-size: 11px; font-weight: 400; }
      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue text { fill: #0C447C; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber text { fill: #633806; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal text { fill: #085041; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple text { fill: #3C3489; }
      .c-gray rect { fill: #F5F5F5; stroke: #666666; }
      .c-gray text { fill: #333333; }
      
      /* 动画定义 */
      .layer-frame {
        opacity: 0;
        animation: fadeIn 0.3s ease-out forwards;
      }
      
      .component-card {
        opacity: 0;
        transform-origin: center;
        animation: popIn 0.4s ease-out forwards;
      }
      
      @keyframes popIn {
        0% { opacity: 0; transform: scale(0.8); }
        100% { opacity: 1; transform: scale(1); }
      }
      
      .connector-line {
        opacity: 0;
        animation: fadeInLine 0.4s ease-out forwards;
      }
      
      /* 虚线流动动画 */
      .connector-line[stroke-dasharray] {
        animation: fadeInLine 0.4s ease-out forwards, dashFlow 2s linear infinite;
      }
      
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      
      @keyframes fadeInLine {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      
      @keyframes dashFlow {
        to { stroke-dashoffset: -9; }
      }
      
      .legend {
        opacity: 0;
        animation: fadeIn 0.5s ease-out 2s forwards;
      }
    </style>
  </defs>

  <text class="th" x="360" y="28" text-anchor="middle" dominant-baseline="central" font-size="16">订单创建调用链路</text>

  <!-- 主链路：从左到右 -->
  <g class="component-card c-blue" filter="url(#shadow)" style="animation-delay: 0s">
    <rect x="30" y="70" width="100" height="50" rx="6" stroke-width="0.8"/>
    <text class="th" x="80" y="88" text-anchor="middle" dominant-baseline="central">H5 商城</text>
    <text class="ts" x="80" y="106" text-anchor="middle" dominant-baseline="central">mall-h5</text>
  </g>

  <line class="connector-line" x1="130" y1="95" x2="180" y2="95" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 0.5s"/>
  <text class="ts" x="155" y="85" text-anchor="middle" dominant-baseline="central" fill="#185FA5">HTTPS</text>

  <g class="component-card c-amber" filter="url(#shadow)" style="animation-delay: 0.3s">
    <rect x="180" y="70" width="100" height="50" rx="6" stroke-width="0.8"/>
    <text class="th" x="230" y="88" text-anchor="middle" dominant-baseline="central">订单代理</text>
    <text class="ts" x="230" y="106" text-anchor="middle" dominant-baseline="central">proxy-order</text>
  </g>

  <line class="connector-line" x1="280" y1="95" x2="320" y2="95" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 0.6s"/>
  <text class="ts" x="295" y="85" text-anchor="middle" dominant-baseline="central" fill="#854F0B">RPC</text>

  <g class="component-card c-teal" filter="url(#shadow)" style="animation-delay: 0.4s">
    <rect x="320" y="70" width="100" height="50" rx="6" stroke-width="0.8"/>
    <text class="th" x="370" y="88" text-anchor="middle" dominant-baseline="central">订单服务</text>
    <text class="ts" x="370" y="106" text-anchor="middle" dominant-baseline="central">order-service</text>
  </g>

  <line class="connector-line" x1="420" y1="95" x2="460" y2="95" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 0.7s"/>
  <text class="ts" x="435" y="85" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">RPC</text>

  <g class="component-card c-teal" filter="url(#shadow)" style="animation-delay: 0.5s">
    <rect x="460" y="70" width="100" height="50" rx="6" stroke-width="0.8"/>
    <text class="th" x="510" y="88" text-anchor="middle" dominant-baseline="central">库存服务</text>
    <text class="ts" x="510" y="106" text-anchor="middle" dominant-baseline="central">stock-service</text>
  </g>

  <line class="connector-line" x1="560" y1="95" x2="600" y2="95" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 0.8s"/>
  <text class="ts" x="575" y="85" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">RPC</text>

  <g class="component-card c-purple" filter="url(#shadow)" style="animation-delay: 0.6s">
    <rect x="600" y="70" width="100" height="50" rx="6" stroke-width="0.8"/>
    <text class="th" x="650" y="88" text-anchor="middle" dominant-baseline="central">支付服务</text>
    <text class="ts" x="650" y="106" text-anchor="middle" dominant-baseline="central">pay-service</text>
  </g>

  <!-- 异步消息：订单服务 -> MQ -->
  <line class="connector-line" x1="370" y1="120" x2="370" y2="155" stroke="#888780" stroke-width="1.2" stroke-dasharray="6 3" marker-end="url(#arrow)" style="animation-delay: 0.9s"/>

  <g class="component-card c-gray" filter="url(#shadow)" style="animation-delay: 0.7s">
    <rect x="320" y="155" width="100" height="40" rx="6" stroke-width="0.8"/>
    <text class="th" x="370" y="172" text-anchor="middle" dominant-baseline="central">RocketMQ</text>
    <text class="ts" x="370" y="186" text-anchor="middle" dominant-baseline="central">订单创建消息</text>
  </g>

  <!-- 返回链路：虚线（使用连续路径） -->
  <path class="connector-line" d="M 650 120 L 650 200 L 85 200 L 85 120" fill="none" stroke="#534AB7" stroke-width="1.2" stroke-dasharray="6 3" marker-end="url(#arrow)" style="animation-delay: 1.0s"/>

  <text class="ts" x="350" y="212" text-anchor="middle" dominant-baseline="central" fill="#534AB7">返回订单创建结果</text>

  <!-- 图例 -->
  <g class="legend">
    <line x1="30" y1="280" x2="200" y2="280" stroke="#888780" stroke-width="0.5" stroke-opacity="0.3"/>
    <text class="ts" x="30" y="298" dominant-baseline="central" font-weight="500">图例说明</text>

    <g class="c-blue"><rect x="30" y="310" width="16" height="12" rx="2" stroke-width="0.5"/>
      <text class="ts" x="52" y="318" dominant-baseline="central">前端应用</text></g>
    <g class="c-amber"><rect x="110" y="310" width="16" height="12" rx="2" stroke-width="0.5"/>
      <text class="ts" x="132" y="318" dominant-baseline="central">网关/代理</text></g>
    <g class="c-teal"><rect x="200" y="310" width="16" height="12" rx="2" stroke-width="0.5"/>
      <text class="ts" x="222" y="318" dominant-baseline="central">业务服务</text></g>
    <g class="c-purple"><rect x="290" y="310" width="16" height="12" rx="2" stroke-width="0.5"/>
      <text class="ts" x="312" y="318" dominant-baseline="central">公共服务</text></g>
    <g class="c-gray"><rect x="380" y="310" width="16" height="12" rx="2" stroke-width="0.5"/>
      <text class="ts" x="402" y="318" dominant-baseline="central">消息队列</text></g>

    <line x1="30" y1="340" x2="90" y2="340" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text class="ts" x="100" y="342" dominant-baseline="central">同步调用</text>
    <line x1="160" y1="340" x2="220" y2="340" stroke="#888780" stroke-width="1.2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
    <text class="ts" x="230" y="342" dominant-baseline="central">异步消息</text>
    <line x1="300" y1="340" x2="360" y2="340" stroke="#534AB7" stroke-width="1.2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
    <text class="ts" x="370" y="342" dominant-baseline="central">返回结果</text>
  </g>

</svg>
