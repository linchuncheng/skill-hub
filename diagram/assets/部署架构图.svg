<svg width="100%" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="grad-ingress" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5C8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-gateway" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D48A1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-service" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50C878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A9E5C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-middleware" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7D3C98;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-storage" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7F8C8D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D6D7E;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    
    <!-- 箭头 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>
  
  <style>
    text { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    
    /* 框架和说明文字动画 */
    .layer-frame {
      opacity: 0;
      animation: fadeIn 0.3s ease-out forwards;
    }
    
    /* 组件卡片动画 */
    .component-card {
      opacity: 0;
      transform-origin: center;
      animation: popIn 0.4s ease-out forwards;
    }
    
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    /* 连接线动画 */
    .connector-line {
      opacity: 0;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: drawLine 0.4s ease-out forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    
    @keyframes drawLine {
      0% { opacity: 0; stroke-dashoffset: 50; }
      100% { opacity: 1; stroke-dashoffset: 0; }
    }
    
    /* 图例动画 */
    .legend {
      opacity: 0;
      animation: fadeIn 0.5s ease-out 2.5s forwards;
    }
  </style>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="#F8FAFC"/>
  
  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">Kubernetes 生产环境部署架构</text>
  
  <!-- ========== 流量入口层 ========== -->
  <!-- 框架+说明 (第1步) -->
  <g class="layer-frame" style="animation-delay: 0s">
    <rect x="20" y="60" width="100" height="24" rx="4" fill="#E0F2FE"/>
    <text x="70" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#0369A1">流量入口层</text>
    <line x1="130" y1="72" x2="780" y2="72" stroke="#E2E8F0" stroke-width="1"/>

  </g>
  
  <!-- 组件 (第2步) -->
  <g class="component-card" filter="url(#shadow)" style="animation-delay: 0.3s">
    <rect x="320" y="95" width="160" height="70" rx="10" fill="url(#grad-ingress)"/>
    <g transform="translate(388, 105)">
      <circle cx="12" cy="12" r="12" fill="white" fill-opacity="0.2"/>
      <path d="M12 6v6l4 2" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <text x="400" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="white">Ingress Controller</text>
    <text x="400" y="157" text-anchor="middle" font-size="10" fill="#E0F2FE">负载均衡 · SSL 终止</text>
  </g>
  
  <!-- 连线 (第3步) -->

  
  <!-- ========== 网关层 ========== -->
  <!-- 框架+说明 (第1步) -->
  <g class="layer-frame" style="animation-delay: 0.5s">
    <rect x="20" y="195" width="80" height="24" rx="4" fill="#FEF3C7"/>
    <text x="60" y="211" text-anchor="middle" font-size="11" font-weight="600" fill="#B45309">网关层</text>
    <line x1="110" y1="207" x2="780" y2="207" stroke="#E2E8F0" stroke-width="1"/>
  </g>
  
  <!-- 组件 (第2步) -->
  <g class="component-card" filter="url(#shadow)" style="animation-delay: 0.8s">
    <rect x="180" y="230" width="140" height="70" rx="10" fill="url(#grad-gateway)"/>
    <g transform="translate(238, 240)">
      <circle cx="12" cy="12" r="12" fill="white" fill-opacity="0.2"/>
      <path d="M8 12h8M12 8v8" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="250" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="white">API Gateway</text>
    <text x="250" y="292" text-anchor="middle" font-size="10" fill="#FEF3C7">Nginx · Pod x2</text>
  </g>
  
  <g class="component-card" filter="url(#shadow)" style="animation-delay: 1s">
    <rect x="480" y="230" width="140" height="70" rx="10" fill="url(#grad-gateway)"/>
    <g transform="translate(538, 240)">
      <circle cx="12" cy="12" r="12" fill="white" fill-opacity="0.2"/>
      <path d="M8 12h8M12 8v8" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="550" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="white">Web Gateway</text>
    <text x="550" y="292" text-anchor="middle" font-size="10" fill="#FEF3C7">Nginx · Pod x2</text>
  </g>
  
  <!-- 连线 (第3步) -->

  
  <!-- ========== 应用服务层 ========== -->
  <!-- 框架+说明 (第1步) -->
  <g class="layer-frame" style="animation-delay: 1s">
    <rect x="20" y="330" width="90" height="24" rx="4" fill="#DCFCE7"/>
    <text x="65" y="346" text-anchor="middle" font-size="11" font-weight="600" fill="#15803D">应用服务层</text>
    <line x1="120" y1="342" x2="780" y2="342" stroke="#E2E8F0" stroke-width="1"/>
  </g>
  
  <!-- 组件 (第2步) -->
  <g class="component-card" filter="url(#shadow)" style="animation-delay: 1.3s">
    <rect x="40" y="365" width="120" height="70" rx="10" fill="url(#grad-service)"/>
    <g transform="translate(88, 375)">
      <circle cx="12" cy="12" r="12" fill="white" fill-opacity="0.2"/>
      <rect x="7" y="7" width="10" height="10" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
    </g>
    <text x="100" y="413" text-anchor="middle" font-size="12" font-weight="600" fill="white">订单服务</text>
    <text x="100" y="427" text-anchor="middle" font-size="10" fill="#DCFCE7">Pod x3</text>
  </g>
  
  <g class="component-card" filter="url(#shadow)" style="animation-delay: 1.4s">
    <rect x="180" y="365" width="120" height="70" rx="10" fill="url(#grad-service)"/>
    <g transform="translate(228, 375)">
      <circle cx="12" cy="12" r="12" fill="white" fill-opacity="0.2"/>
      <rect x="7" y="7" width="10" height="10" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
    </g>
    <text x="240" y="413" text-anchor="middle" font-size="12" font-weight="600" fill="white">商品服务</text>
    <text x="240" y="427" text-anchor="middle" font-size="10" fill="#DCFCE7">Pod x3</text>
  </g>
  
  <g class="component-card" filter="url(#shadow)" style="animation-delay: 1.5s">
    <rect x="320" y="365" width="120" height="70" rx="10" fill="url(#grad-service)"/>
    <g transform="translate(368, 375)">
      <circle cx="12" cy="12" r="12" fill="white" fill-opacity="0.2"/>
      <rect x="7" y="7" width="10" height="10" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
    </g>
    <text x="380" y="413" text-anchor="middle" font-size="12" font-weight="600" fill="white">用户服务</text>
    <text x="380" y="427" text-anchor="middle" font-size="10" fill="#DCFCE7">Pod x3</text>
  </g>
  
  <g class="component-card" filter="url(#shadow)" style="animation-delay: 1.6s">
    <rect x="460" y="365" width="120" height="70" rx="10" fill="url(#grad-service)"/>
    <g transform="translate(508, 375)">
      <circle cx="12" cy="12" r="12" fill="white" fill-opacity="0.2"/>
      <rect x="7" y="7" width="10" height="10" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
    </g>
    <text x="520" y="413" text-anchor="middle" font-size="12" font-weight="600" fill="white">支付服务</text>
    <text x="520" y="427" text-anchor="middle" font-size="10" fill="#DCFCE7">Pod x3</text>
  </g>
  
  <g class="component-card" filter="url(#shadow)" style="animation-delay: 1.7s">
    <rect x="600" y="365" width="120" height="70" rx="10" fill="url(#grad-service)"/>
    <g transform="translate(648, 375)">
      <circle cx="12" cy="12" r="12" fill="white" fill-opacity="0.2"/>
      <rect x="7" y="7" width="10" height="10" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
    </g>
    <text x="660" y="413" text-anchor="middle" font-size="12" font-weight="600" fill="white">库存服务</text>
    <text x="660" y="427" text-anchor="middle" font-size="10" fill="#DCFCE7">Pod x3</text>
  </g>
  
  <!-- 连线 (第3步) -->

  
  <!-- ========== 中间件层 ========== -->
  <!-- 框架+说明 (第1步) -->
  <g class="layer-frame" style="animation-delay: 1.5s">
    <rect x="20" y="465" width="80" height="24" rx="4" fill="#F3E8FF"/>
    <text x="60" y="481" text-anchor="middle" font-size="11" font-weight="600" fill="#7C3AED">中间件层</text>
    <line x1="110" y1="477" x2="780" y2="477" stroke="#E2E8F0" stroke-width="1"/>
  </g>
  
  <!-- 组件 (第2步) -->
  <g class="component-card" filter="url(#shadow)" style="animation-delay: 1.8s">
    <rect x="100" y="500" width="130" height="70" rx="10" fill="url(#grad-middleware)"/>
    <g transform="translate(153, 510)">
      <circle cx="12" cy="12" r="12" fill="white" fill-opacity="0.2"/>
      <path d="M8 10l4 4 4-4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="165" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="white">Redis</text>
    <text x="165" y="562" text-anchor="middle" font-size="10" fill="#F3E8FF">Cluster x6</text>
  </g>
  
  <g class="component-card" filter="url(#shadow)" style="animation-delay: 1.9s">
    <rect x="260" y="500" width="130" height="70" rx="10" fill="url(#grad-middleware)"/>
    <g transform="translate(313, 510)">
      <circle cx="12" cy="12" r="12" fill="white" fill-opacity="0.2"/>
      <path d="M7 12h10M12 7v10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="325" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="white">RocketMQ</text>
    <text x="325" y="562" text-anchor="middle" font-size="10" fill="#F3E8FF">Broker x3</text>
  </g>
  
  <g class="component-card" filter="url(#shadow)" style="animation-delay: 2s">
    <rect x="420" y="500" width="130" height="70" rx="10" fill="url(#grad-middleware)"/>
    <g transform="translate(473, 510)">
      <circle cx="12" cy="12" r="12" fill="white" fill-opacity="0.2"/>
      <circle cx="12" cy="12" r="4" stroke="white" stroke-width="1.5" fill="none"/>
    </g>
    <text x="485" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="white">Nacos</text>
    <text x="485" y="562" text-anchor="middle" font-size="10" fill="#F3E8FF">Server x3</text>
  </g>
  
  <g class="component-card" filter="url(#shadow)" style="animation-delay: 2.1s">
    <rect x="580" y="500" width="130" height="70" rx="10" fill="url(#grad-middleware)"/>
    <g transform="translate(633, 510)">
      <circle cx="12" cy="12" r="12" fill="white" fill-opacity="0.2"/>
      <path d="M8 8l8 8M16 8l-8 8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="645" y="548" text-anchor="middle" font-size="11" font-weight="600" fill="white">Elasticsearch</text>
    <text x="645" y="562" text-anchor="middle" font-size="10" fill="#F3E8FF">Cluster x3</text>
  </g>
  
  <!-- 底部图例 -->
  <g class="legend" transform="translate(250, 585)">
    <rect x="0" y="0" width="12" height="12" rx="3" fill="url(#grad-ingress)"/>
    <text x="18" y="10" font-size="10" fill="#475569">流量入口</text>
    
    <rect x="70" y="0" width="12" height="12" rx="3" fill="url(#grad-gateway)"/>
    <text x="88" y="10" font-size="10" fill="#475569">网关</text>
    
    <rect x="130" y="0" width="12" height="12" rx="3" fill="url(#grad-service)"/>
    <text x="148" y="10" font-size="10" fill="#475569">微服务</text>
    
    <rect x="200" y="0" width="12" height="12" rx="3" fill="url(#grad-middleware)"/>
    <text x="218" y="10" font-size="10" fill="#475569">中间件</text>
    
    <rect x="280" y="0" width="12" height="12" rx="3" fill="url(#grad-storage)"/>
    <text x="298" y="10" font-size="10" fill="#475569">存储</text>
  </g>
</svg>
