<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" style="background-color: white;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
    .th { font-size: 13px; font-weight: 500; }
    .ts { font-size: 11px; font-weight: 400; }
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #444441; }
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-red rect { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    
    /* 动画样式 */
    .state-node {
      opacity: 0;
      transform-origin: center;
      animation: popIn 0.4s ease-out forwards;
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    .start-node {
      opacity: 0;
      animation: fadeIn 0.3s ease-out forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    .transition-line {
      opacity: 0;
      animation: fadeIn 0.3s ease-out forwards;
    }
    .transition-label {
      opacity: 0;
      animation: fadeIn 0.3s ease-out forwards;
    }
    .legend-item {
      opacity: 0;
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</defs>

<text class="th" x="340" y="20" text-anchor="middle" dominant-baseline="central" font-size="14">状态图模板 - 订单状态流转</text>

<!-- 开始节点 -->
<circle class="start-node" cx="150" cy="70" r="10" fill="#0F6E56" stroke="#085041" stroke-width="2" style="animation-delay: 0s"/>
<text class="ts start-node" x="150" y="50" text-anchor="middle" dominant-baseline="central" style="animation-delay: 0s">开始</text>

<!-- 第一行状态：按流转顺序显示 -->
<!-- 待支付 -->
<g class="c-blue state-node" style="animation-delay: 0.3s"><rect x="190" y="52" width="70" height="36" rx="18" stroke-width="1"/>
  <text class="th" x="225" y="70" text-anchor="middle" dominant-baseline="central">待支付</text></g>

<!-- 已支付 -->
<g class="c-teal state-node" style="animation-delay: 0.6s"><rect x="290" y="52" width="70" height="36" rx="18" stroke-width="1"/>
  <text class="th" x="325" y="70" text-anchor="middle" dominant-baseline="central">已支付</text></g>

<!-- 已发货 -->
<g class="c-purple state-node" style="animation-delay: 0.9s"><rect x="390" y="52" width="70" height="36" rx="18" stroke-width="1"/>
  <text class="th" x="425" y="70" text-anchor="middle" dominant-baseline="central">已发货</text></g>

<!-- 已完成 -->
<g class="c-gray state-node" style="animation-delay: 1.2s"><rect x="490" y="52" width="70" height="36" rx="18" stroke-width="1"/>
  <text class="th" x="525" y="70" text-anchor="middle" dominant-baseline="central">已完成</text></g>

<!-- 第二行状态：异常/分支状态 -->
<!-- 已取消 -->
<g class="c-red state-node" style="animation-delay: 1.5s"><rect x="190" y="140" width="70" height="36" rx="18" stroke-width="1"/>
  <text class="th" x="225" y="158" text-anchor="middle" dominant-baseline="central">已取消</text></g>

<!-- 退款中 -->
<g class="c-amber state-node" style="animation-delay: 1.8s"><rect x="390" y="140" width="70" height="36" rx="18" stroke-width="1"/>
  <text class="th" x="425" y="158" text-anchor="middle" dominant-baseline="central">退款中</text></g>

<!-- 已退款 -->
<g class="c-coral state-node" style="animation-delay: 2.1s"><rect x="490" y="140" width="70" height="36" rx="18" stroke-width="1"/>
  <text class="th" x="525" y="158" text-anchor="middle" dominant-baseline="central">已退款</text></g>

<!-- 状态流转箭头：按主流程 -> 分支流程顺序 -->
<!-- 开始 -> 待支付 -->
<line class="transition-line" x1="160" y1="70" x2="190" y2="70" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)" style="animation-delay: 0.15s"/>
<text class="ts transition-label" x="175" y="64" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 0.25s">创建</text>

<!-- 待支付 -> 已支付 -->
<line class="transition-line" x1="260" y1="70" x2="290" y2="70" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)" style="animation-delay: 0.45s"/>
<text class="ts transition-label" x="275" y="62" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 0.55s">支付</text>

<!-- 已支付 -> 已发货 -->
<line class="transition-line" x1="360" y1="70" x2="390" y2="70" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)" style="animation-delay: 0.75s"/>
<text class="ts transition-label" x="375" y="62" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 0.85s">发货</text>

<!-- 已发货 -> 已完成 -->
<line class="transition-line" x1="460" y1="70" x2="490" y2="70" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)" style="animation-delay: 1.05s"/>
<text class="ts transition-label" x="475" y="62" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 1.15s">收货</text>

<!-- 待支付 -> 已取消（超时） -->
<line class="transition-line" x1="225" y1="88" x2="225" y2="140" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)" style="animation-delay: 1.35s"/>
<text class="ts transition-label" x="240" y="115" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 1.45s">超时</text>

<!-- 已支付 -> 退款中 -->
<line class="transition-line" x1="330" y1="88" x2="390" y2="153" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)" style="animation-delay: 1.65s"/>
<text class="ts transition-label" x="365" y="110" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 1.75s">退款</text>

<!-- 已发货 -> 退款中 -->
<line class="transition-line" x1="425" y1="88" x2="425" y2="140" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)" style="animation-delay: 1.95s"/>
<text class="ts transition-label" x="445" y="115" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 2.05s">退款</text>

<!-- 退款中 -> 已退款 -->
<line class="transition-line" x1="460" y1="158" x2="490" y2="158" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)" style="animation-delay: 2.25s"/>
<text class="ts transition-label" x="475" y="150" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 2.35s">通过</text>

<!-- 退款中 -> 已支付 (拒绝退款) -->
<line class="transition-line" x1="390" y1="163" x2="320" y2="88" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)" style="animation-delay: 2.55s"/>
<text class="ts transition-label" x="365" y="135" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 2.65s">拒绝</text>

<!-- 图例说明 -->
<line class="transition-line" x1="150" y1="210" x2="580" y2="210" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" stroke-opacity="0.35" style="animation-delay: 2.8s"/>
<g class="c-blue legend-item" style="animation-delay: 2.9s"><rect x="150" y="225" width="20" height="20" rx="10" stroke-width="1"/>
  <text class="ts" x="178" y="235" dominant-baseline="central" fill="#666">= 初始状态</text></g>
<g class="c-gray legend-item" style="animation-delay: 3s"><rect x="260" y="225" width="20" height="20" rx="10" stroke-width="1"/>
  <text class="ts" x="288" y="235" dominant-baseline="central" fill="#666">= 终态</text></g>
<g class="c-teal legend-item" style="animation-delay: 3.1s"><rect x="340" y="225" width="20" height="20" rx="10" stroke-width="1"/>
  <text class="ts" x="368" y="235" dominant-baseline="central" fill="#666">= 中间状态</text></g>

<text class="ts legend-item" x="340" y="280" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 3.2s">状态图：展示对象生命周期中的状态变化及触发条件</text>

</svg>
