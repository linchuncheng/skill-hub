<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 620" width="950" height="620">
  <defs>
    <!-- 标准箭头 -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    
    <!-- 光点渐变 -->
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    
    <style>
      /* 组件样式 */
      .component {
        opacity: 0;
        animation: fadeIn 0.4s ease-out forwards;
      }
      
      /* 连线样式 */
      .line-blue {
        stroke: #3b82f6;
        stroke-width: 1.8;
        fill: none;
        opacity: 0;
        animation: fadeIn 0.4s ease-out forwards;
      }
      .line-cyan {
        stroke: #06b6d4;
        stroke-width: 1.8;
        fill: none;
        opacity: 0;
        animation: fadeIn 0.4s ease-out forwards;
      }
      .line-purple-dash {
        stroke: #8b5cf6;
        stroke-width: 1.4;
        fill: none;
        stroke-dasharray: 6 3;
        opacity: 0;
        animation: fadeIn 0.4s ease-out forwards;
      }
      .line-gray-dash {
        stroke: #9ca3af;
        stroke-width: 1.4;
        fill: none;
        stroke-dasharray: 6 3;
        opacity: 0;
        animation: fadeIn 0.4s ease-out forwards;
      }
      
      /* 光点动画 */
      .dot-blue {
        opacity: 0;
        animation: dotFadeIn 0.3s ease-out forwards, dotMove 2s ease-in-out infinite;
      }
      .dot-cyan {
        opacity: 0;
        animation: dotFadeIn 0.3s ease-out forwards, dotMove 2s ease-in-out infinite;
      }
      .dot-purple {
        opacity: 0;
        animation: dotFadeIn 0.3s ease-out forwards, dotMove 2.5s ease-in-out infinite;
      }
      
      /* 动画关键帧 */
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes dotFadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes dotMove {
        0% { offset-distance: 0%; }
        100% { offset-distance: 100%; }
      }
      @keyframes dashMove {
        to { stroke-dashoffset: -9; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      
      /* 文字样式 */
      .label {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 12px;
        fill: #374151;
      }
      .label-title {
        font-size: 13px;
        font-weight: 600;
        fill: #1f2937;
      }
      .label-small {
        font-size: 10px;
        fill: #6b7280;
      }
      .label-stage {
        font-size: 14px;
        font-weight: 600;
        fill: #6b7280;
        opacity: 0;
        animation: fadeIn 0.3s ease-out forwards;
      }
      
      /* 脉冲动画 */
      .pulse {
        animation: pulse 2s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- 背景 -->
  <rect width="950" height="620" fill="#fafafa"/>
  
  <!-- 阶段标签 -->
  <text class="label-stage" x="120" y="40" style="animation-delay: 0.12s;">数据生产</text>
  <text class="label-stage" x="380" y="40" style="animation-delay: 0.15s;">消息存储与分发</text>
  <text class="label-stage" x="700" y="40" style="animation-delay: 0.18s;">数据消费</text>
  
  <!-- ===== 上游: Producers ===== -->
  <g class="component" style="animation-delay: 0.2s;">
    <rect x="80" y="120" width="120" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
    <text class="label-title" x="140" y="142" text-anchor="middle">Producer A</text>
    <text class="label-small" x="140" y="158" text-anchor="middle">Topic: orders</text>
  </g>
  
  <g class="component" style="animation-delay: 0.22s;">
    <rect x="80" y="220" width="120" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
    <text class="label-title" x="140" y="242" text-anchor="middle">Producer B</text>
    <text class="label-small" x="140" y="258" text-anchor="middle">Topic: orders</text>
  </g>
  
  <!-- ===== 中心: Kafka Broker Cluster ===== -->
  <g class="component" style="animation-delay: 0.3s;">
    <!-- Broker集群容器 -->
    <rect x="260" y="80" width="420" height="340" rx="12" fill="#f8fafc" stroke="#1e40af" stroke-width="2" filter="url(#shadow)"/>
    <text class="label-title" x="470" y="110" text-anchor="middle" font-size="15">Kafka Broker Cluster</text>
    
    <!-- Broker-0 -->
    <g style="animation-delay: 0.32s;">
      <rect x="280" y="130" width="110" height="130" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text class="label-title" x="335" y="155" text-anchor="middle">Broker-0</text>
      <text class="label-small" x="335" y="172" text-anchor="middle">Leader: P0</text>
      <!-- Partition 0 -->
      <rect x="295" y="185" width="80" height="28" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
      <text class="label-small" x="335" y="204" text-anchor="middle">Partition 0</text>
      <!-- Log Segment视觉暗喻 -->
      <rect x="295" y="220" width="80" height="8" rx="2" fill="#bfdbfe"/>
      <line x1="311" y1="220" x2="311" y2="228" stroke="#3b82f6" stroke-width="0.8"/>
      <line x1="327" y1="220" x2="327" y2="228" stroke="#3b82f6" stroke-width="0.8"/>
      <line x1="343" y1="220" x2="343" y2="228" stroke="#3b82f6" stroke-width="0.8"/>
      <line x1="359" y1="220" x2="359" y2="228" stroke="#3b82f6" stroke-width="0.8"/>
      <!-- ISR标识 -->
      <text class="label-small" x="335" y="245" text-anchor="middle">ISR: {0,1}</text>
    </g>
    
    <!-- Broker-1 (英雄组件-核心展示) -->
    <g style="animation-delay: 0.35s;">
      <rect x="405" y="120" width="130" height="150" rx="8" fill="#ffffff" stroke="#1e40af" stroke-width="2"/>
      <text class="label-title" x="470" y="147" text-anchor="middle">Broker-1</text>
      <text class="label-small" x="470" y="165" text-anchor="middle">Leader: P1</text>
      <!-- Partition 1 -->
      <rect x="420" y="178" width="90" height="30" rx="4" fill="#dbeafe" stroke="#1e40af" stroke-width="1.2"/>
      <text class="label" x="470" y="198" text-anchor="middle" font-weight="600">Partition 1</text>
      <!-- Log Segment视觉暗喻 -->
      <rect x="420" y="216" width="90" height="10" rx="2" fill="#bfdbfe"/>
      <line x1="438" y1="216" x2="438" y2="226" stroke="#1e40af" stroke-width="0.8"/>
      <line x1="456" y1="216" x2="456" y2="226" stroke="#1e40af" stroke-width="0.8"/>
      <line x1="474" y1="216" x2="474" y2="226" stroke="#1e40af" stroke-width="0.8"/>
      <line x1="492" y1="216" x2="492" y2="226" stroke="#1e40af" stroke-width="0.8"/>
      <!-- 位移指针 -->
      <polygon points="474,212 478,218 470,218" fill="#1e40af"/>
      <!-- ISR标识 -->
      <text class="label" x="470" y="245" text-anchor="middle" font-weight="600">ISR: {1,2}</text>
      <text class="label-small" x="470" y="260" text-anchor="middle">HW: 1024</text>
    </g>
    
    <!-- Broker-2 -->
    <g style="animation-delay: 0.38s;">
      <rect x="550" y="130" width="110" height="130" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text class="label-title" x="605" y="155" text-anchor="middle">Broker-2</text>
      <text class="label-small" x="605" y="172" text-anchor="middle">Leader: P2</text>
      <!-- Partition 2 -->
      <rect x="565" y="185" width="80" height="28" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
      <text class="label-small" x="605" y="204" text-anchor="middle">Partition 2</text>
      <!-- Log Segment视觉暗喻 -->
      <rect x="565" y="220" width="80" height="8" rx="2" fill="#bfdbfe"/>
      <line x1="581" y1="220" x2="581" y2="228" stroke="#3b82f6" stroke-width="0.8"/>
      <line x1="597" y1="220" x2="597" y2="228" stroke="#3b82f6" stroke-width="0.8"/>
      <line x1="613" y1="220" x2="613" y2="228" stroke="#3b82f6" stroke-width="0.8"/>
      <line x1="629" y1="220" x2="629" y2="228" stroke="#3b82f6" stroke-width="0.8"/>
      <!-- ISR标识 -->
      <text class="label-small" x="605" y="245" text-anchor="middle">ISR: {2,0}</text>
    </g>
    
    <!-- 副本同步连线(紫色虚线) -->
    <path class="line-purple-dash pulse" d="M 390 225 Q 400 225 405 225" style="animation-delay: 0.45s, 0.45s; stroke-dashoffset: -9;"/>
    <path class="line-purple-dash pulse" d="M 535 225 Q 540 225 550 225" style="animation-delay: 0.48s, 0.48s; stroke-dashoffset: -9;"/>
    
    <!-- 标签 -->
    <text class="label-small" x="398" y="218" text-anchor="middle" style="animation-delay: 0.5s; opacity: 0; animation: fadeIn 0.3s ease-out forwards;">复制</text>
    <text class="label-small" x="543" y="218" text-anchor="middle" style="animation-delay: 0.52s; opacity: 0; animation: fadeIn 0.3s ease-out forwards;">复制</text>
  </g>
  
  <!-- ===== 下游: Consumer Groups ===== -->
  <g class="component" style="animation-delay: 0.5s;">
    <rect x="750" y="140" width="130" height="50" rx="6" fill="#ffffff" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
    <text class="label-title" x="815" y="162" text-anchor="middle">Consumer Group-1</text>
    <text class="label-small" x="815" y="178" text-anchor="middle">P0, P1, P2</text>
  </g>
  
  <g class="component" style="animation-delay: 0.52s;">
    <rect x="750" y="240" width="130" height="50" rx="6" fill="#ffffff" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
    <text class="label-title" x="815" y="262" text-anchor="middle">Consumer Group-2</text>
    <text class="label-small" x="815" y="278" text-anchor="middle">P0, P1</text>
  </g>
  
  <!-- ===== 底部: 协调层 ===== -->
  <g class="component" style="animation-delay: 0.55s;">
    <rect x="380" y="480" width="180" height="50" rx="8" fill="#ffffff" stroke="#9ca3af" stroke-width="1.5" filter="url(#shadow)"/>
    <text class="label-title" x="470" y="502" text-anchor="middle">ZooKeeper / KRaft</text>
    <text class="label-small" x="470" y="518" text-anchor="middle">元数据 + 副本选举</text>
  </g>
  
  <!-- ===== 连线: Producer → Broker ===== -->
  <!-- Producer A → Broker-0 -->
  <path class="line-blue" d="M 200 145 Q 230 145 260 145 L 280 195" style="animation-delay: 0.6s;" marker-end="url(#arrow)"/>
  <circle class="dot-blue" r="4" fill="url(#glow-blue)" style="offset-path: path('M 200 145 Q 230 145 260 145 L 280 195'); animation-delay: 0.9s, 0.9s;"/>
  <text class="label-small" x="230" y="138" text-anchor="middle" style="animation-delay: 0.65s; opacity: 0; animation: fadeIn 0.3s ease-out forwards;">Key Hash</text>
  
  <!-- Producer B → Broker-1 -->
  <path class="line-blue" d="M 200 245 Q 300 245 405 200 L 420 200" style="animation-delay: 0.63s;" marker-end="url(#arrow)"/>
  <circle class="dot-blue" r="4" fill="url(#glow-blue)" style="offset-path: path('M 200 245 Q 300 245 405 200 L 420 200'); animation-delay: 0.95s, 0.95s;"/>
  
  <!-- ===== 连线: Broker → Consumer ===== -->
  <!-- Broker-0 → Consumer Group-1 -->
  <path class="line-cyan" d="M 390 195 Q 570 165 750 165" style="animation-delay: 0.66s;" marker-end="url(#arrow)"/>
  <circle class="dot-cyan" r="4" fill="url(#glow-cyan)" style="offset-path: path('M 390 195 Q 570 165 750 165'); animation-delay: 1.0s, 1.0s;"/>
  
  <!-- Broker-1 → Consumer Group-1 -->
  <path class="line-cyan" d="M 535 195 Q 642 165 750 165" style="animation-delay: 0.69s;" marker-end="url(#arrow)"/>
  <circle class="dot-cyan" r="4" fill="url(#glow-cyan)" style="offset-path: path('M 535 195 Q 642 165 750 165'); animation-delay: 1.05s, 1.05s;"/>
  
  <!-- Broker-2 → Consumer Group-1 -->
  <path class="line-cyan" d="M 660 195 Q 705 165 750 165" style="animation-delay: 0.72s;" marker-end="url(#arrow)"/>
  <circle class="dot-cyan" r="4" fill="url(#glow-cyan)" style="offset-path: path('M 660 195 Q 705 165 750 165'); animation-delay: 1.1s, 1.1s;"/>
  
  <!-- Broker-0 → Consumer Group-2 -->
  <path class="line-cyan" d="M 390 225 Q 570 265 750 265" style="animation-delay: 0.75s;" marker-end="url(#arrow)"/>
  <circle class="dot-cyan" r="4" fill="url(#glow-cyan)" style="offset-path: path('M 390 225 Q 570 265 750 265'); animation-delay: 1.15s, 1.15s;"/>
  
  <!-- Broker-1 → Consumer Group-2 -->
  <path class="line-cyan" d="M 535 225 Q 642 265 750 265" style="animation-delay: 0.78s;" marker-end="url(#arrow)"/>
  <circle class="dot-cyan" r="4" fill="url(#glow-cyan)" style="offset-path: path('M 535 225 Q 642 265 750 265'); animation-delay: 1.2s, 1.2s;"/>
  
  <!-- ===== 连线: Broker → ZK/KRaft ===== -->
  <path class="line-gray-dash" d="M 470 420 L 470 480" style="animation-delay: 0.8s; stroke-dashoffset: -9;" marker-end="url(#arrow)"/>
  <text class="label-small" x="485" y="455" text-anchor="start" style="animation-delay: 0.85s; opacity: 0; animation: fadeIn 0.3s ease-out forwards;">元数据</text>
  
  <!-- ===== 注释 ===== -->
  <g style="animation-delay: 0.9s; opacity: 0; animation: fadeIn 0.4s ease-out forwards;">
    <text class="label-small" x="80" y="360" fill="#6b7280">核心机制:</text>
    <text class="label-small" x="80" y="380" fill="#6b7280">• 分区分段: 水平扩展 + 顺序写入</text>
    <text class="label-small" x="80" y="400" fill="#6b7280">• ISR副本: 同步复制保证可靠性</text>
    <text class="label-small" x="80" y="420" fill="#6b7280">• 消费者组: 负载均衡 + 容错</text>
    <text class="label-small" x="80" y="440" fill="#6b7280">• 位移管理: Offset自主提交</text>
  </g>
</svg>
