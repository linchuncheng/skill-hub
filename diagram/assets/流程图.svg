<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" style="background-color: white;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
  </filter>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #444441; }
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-red rect { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text { fill: #791F1F; }
    
    /* 动画定义 */
    .layer-frame {
      opacity: 0;
      animation: fadeIn 0.3s ease-out forwards;
    }
    
    .component-card {
      opacity: 0;
      transform-origin: center;
      animation: popIn 0.4s ease-out forwards;
    }
    
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    .connector-line {
      opacity: 0;
      animation: fadeInLine 0.4s ease-out forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    
    @keyframes fadeInLine {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    
    .legend {
      opacity: 0;
      animation: fadeIn 0.5s ease-out 2.5s forwards;
    }
  </style>
</defs>

<text class="th" x="340" y="24" text-anchor="middle" dominant-baseline="central" font-size="15">流程图模板 - 用户登录流程</text>

<!-- 开始 -->
<g class="component-card" filter="url(#shadow)" style="animation-delay: 0s">
  <ellipse cx="340" cy="60" rx="50" ry="24" fill="#0F6E56" stroke="#085041" stroke-width="1.5"/>
  <text class="th" x="340" y="60" text-anchor="middle" dominant-baseline="central" fill="white">开始</text>
</g>

<!-- 输入账号密码 -->
<g class="component-card c-blue" filter="url(#shadow)" style="animation-delay: 0.3s">
  <rect x="270" y="100" width="140" height="44" rx="6" stroke-width="1"/>
  <text class="ts" x="340" y="122" text-anchor="middle" dominant-baseline="central">输入账号密码</text>
</g>

<!-- 验证参数 -->
<g class="component-card c-teal" filter="url(#shadow)" style="animation-delay: 0.4s">
  <rect x="270" y="160" width="140" height="44" rx="6" stroke-width="1"/>
  <text class="ts" x="340" y="182" text-anchor="middle" dominant-baseline="central">验证参数格式</text>
</g>

<!-- 判断：参数合法？ -->
<g class="component-card c-purple" filter="url(#shadow)" style="animation-delay: 0.5s">
  <polygon points="340,220 400,250 340,280 280,250" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text class="ts" x="340" y="250" text-anchor="middle" dominant-baseline="central">参数合法?</text>
</g>

<!-- 提示参数错误 - 放在左侧 -->
<g class="component-card c-red" filter="url(#shadow)" style="animation-delay: 0.6s">
  <rect x="100" y="228" width="120" height="44" rx="6" stroke-width="1"/>
  <text class="ts" x="160" y="250" text-anchor="middle" dominant-baseline="central">提示参数错误</text>
</g>

<!-- 查询用户 -->
<g class="component-card c-teal" filter="url(#shadow)" style="animation-delay: 0.7s">
  <rect x="270" y="310" width="140" height="44" rx="6" stroke-width="1"/>
  <text class="ts" x="340" y="332" text-anchor="middle" dominant-baseline="central">查询用户信息</text>
</g>

<!-- 判断：用户存在？ -->
<g class="component-card c-purple" filter="url(#shadow)" style="animation-delay: 0.8s">
  <polygon points="340,370 400,400 340,430 280,400" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text class="ts" x="340" y="400" text-anchor="middle" dominant-baseline="central">用户存在?</text>
</g>

<!-- 提示用户不存在 - 放在左侧 -->
<g class="component-card c-red" filter="url(#shadow)" style="animation-delay: 0.9s">
  <rect x="100" y="378" width="120" height="44" rx="6" stroke-width="1"/>
  <text class="ts" x="160" y="400" text-anchor="middle" dominant-baseline="central">提示用户不存在</text>
</g>

<!-- 验证密码 -->
<g class="component-card c-teal" filter="url(#shadow)" style="animation-delay: 1.0s">
  <rect x="270" y="460" width="140" height="44" rx="6" stroke-width="1"/>
  <text class="ts" x="340" y="482" text-anchor="middle" dominant-baseline="central">验证密码</text>
</g>

<!-- 判断：密码正确？ -->
<g class="component-card c-purple" filter="url(#shadow)" style="animation-delay: 1.1s">
  <polygon points="340,520 400,550 340,580 280,550" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text class="ts" x="340" y="550" text-anchor="middle" dominant-baseline="central">密码正确?</text>
</g>

<!-- 生成 Token - 放在密码正确?正下方 -->
<g class="component-card c-amber" filter="url(#shadow)" style="animation-delay: 1.2s">
  <rect x="270" y="600" width="140" height="44" rx="6" stroke-width="1"/>
  <text class="ts" x="340" y="622" text-anchor="middle" dominant-baseline="central">生成 JWT Token</text>
</g>

<!-- 提示密码错误 - 放在右侧 -->
<g class="component-card c-red" filter="url(#shadow)" style="animation-delay: 1.3s">
  <rect x="460" y="528" width="120" height="44" rx="6" stroke-width="1"/>
  <text class="ts" x="520" y="550" text-anchor="middle" dominant-baseline="central">提示密码错误</text>
</g>

<!-- 结束 - 放在最下方 -->
<g class="component-card" filter="url(#shadow)" style="animation-delay: 1.4s">
  <ellipse cx="340" cy="680" rx="50" ry="24" fill="#A32D2D" stroke="#791F1F" stroke-width="1.5"/>
  <text class="th" x="340" y="680" text-anchor="middle" dominant-baseline="central" fill="white">结束</text>
</g>

<!-- 主流程连接线 -->
<line class="connector-line" x1="340" y1="84" x2="340" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 1.6s"/>
<line class="connector-line" x1="340" y1="144" x2="340" y2="160" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 1.7s"/>
<line class="connector-line" x1="340" y1="204" x2="340" y2="220" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 1.8s"/>

<!-- 参数合法=否 -> 提示参数错误（向左） -->
<line class="connector-line" x1="280" y1="250" x2="220" y2="250" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 1.9s"/>
<text class="ts" x="250" y="242" text-anchor="middle" dominant-baseline="central" fill="#666">否</text>

<!-- 提示参数错误 -> 结束（拆线绕行，避免穿过提示用户不存在） -->
<line class="connector-line" x1="100" y1="250" x2="80" y2="250" stroke="#888780" stroke-width="1.5" style="animation-delay: 2.0s"/>
<line class="connector-line" x1="80" y1="250" x2="80" y2="680" stroke="#888780" stroke-width="1.5" style="animation-delay: 2.0s"/>
<line class="connector-line" x1="80" y1="680" x2="290" y2="680" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.0s"/>

<!-- 参数合法=是 -> 查询用户 -->
<line class="connector-line" x1="340" y1="280" x2="340" y2="310" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.1s"/>
<text class="ts" x="355" y="295" dominant-baseline="central" fill="#666">是</text>

<line class="connector-line" x1="340" y1="354" x2="340" y2="370" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.2s"/>

<!-- 用户存在=否 -> 提示用户不存在（向左） -->
<line class="connector-line" x1="280" y1="400" x2="220" y2="400" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.3s"/>
<text class="ts" x="250" y="392" text-anchor="middle" dominant-baseline="central" fill="#666">否</text>

<!-- 提示用户不存在 -> 结束（拆线绕行） -->
<line class="connector-line" x1="100" y1="400" x2="80" y2="400" stroke="#888780" stroke-width="1.5" style="animation-delay: 2.4s"/>
<line class="connector-line" x1="80" y1="400" x2="80" y2="680" stroke="#888780" stroke-width="1.5" style="animation-delay: 2.4s"/>
<line class="connector-line" x1="80" y1="680" x2="290" y2="680" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.4s"/>

<!-- 用户存在=是 -> 验证密码 -->
<line class="connector-line" x1="340" y1="430" x2="340" y2="460" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.5s"/>
<text class="ts" x="355" y="445" dominant-baseline="central" fill="#666">是</text>

<line class="connector-line" x1="340" y1="504" x2="340" y2="520" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.6s"/>

<!-- 密码正确=是 -> 生成 Token（垂直向下） -->
<line class="connector-line" x1="340" y1="580" x2="340" y2="600" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.7s"/>
<text class="ts" x="355" y="590" dominant-baseline="central" fill="#666">是</text>

<!-- 生成 Token -> 结束（垂直向下） -->
<line class="connector-line" x1="340" y1="644" x2="340" y2="656" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.8s"/>

<!-- 密码正确=否 -> 提示密码错误（向右） -->
<line class="connector-line" x1="400" y1="550" x2="460" y2="550" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.9s"/>
<text class="ts" x="430" y="542" text-anchor="middle" dominant-baseline="central" fill="#666">否</text>

<!-- 提示密码错误 -> 结束（拆线绕行） -->
<line class="connector-line" x1="520" y1="572" x2="520" y2="680" stroke="#888780" stroke-width="1.5" style="animation-delay: 3.0s"/>
<line class="connector-line" x1="520" y1="680" x2="390" y2="680" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 3.0s"/>

<!-- 图例 -->
<g class="legend">
  <g class="c-blue"><rect x="200" y="730" width="24" height="20" rx="4" stroke-width="1"/>
    <text class="ts" x="232" y="740" dominant-baseline="central" fill="#666">= 处理步骤</text></g>
  <g class="c-purple"><polygon points="300,720 320,730 300,740 280,730" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
    <text class="ts" x="335" y="730" dominant-baseline="central" fill="#666">= 判断</text></g>
  <ellipse cx="420" cy="730" rx="16" ry="10" fill="#0F6E56" stroke="#085041" stroke-width="1"/>
    <text class="ts" x="450" y="730" dominant-baseline="central" fill="#666">= 开始/结束</text>
</g>

</svg>
