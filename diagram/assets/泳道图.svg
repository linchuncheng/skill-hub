<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 776 665" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;max-width:900px;min-width:320px;background:#fff;" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow-sync" viewBox="0 0 8 8" refX="7.5" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 L 1 4 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-async" viewBox="0 0 8 8" refX="7.5" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 L 1 4 Z" fill="#9ca3af"/>
    </marker>
    <radialGradient id="glow-sync" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow-async" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#9ca3af;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9ca3af;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <style>
    .title-t{ font-size:14px; font-weight:600; fill:#334155; }
    .stage-t{ font-size:10px; font-weight:500; fill:#64748B; }
    .col-t{ font-size:10px; font-weight:500; }
    .step-title{ font-size:9px; font-weight:500; fill:#334155; text-anchor:middle; }
    .step-sub{ font-size:8px; fill:#94A3B8; text-anchor:middle; }
    .conn-label{ font-size:9px; fill:#64748B; text-anchor:middle; }
    @keyframes fi{ from{opacity:0;} to{opacity:1;} }
    .anim{ opacity:0; animation:fi 0.5s ease-out forwards; }
    .conn-line{ opacity:0; animation:fi 0.4s ease-out forwards; }
    .conn-line-dash{ opacity:0; animation:fi 0.4s ease-out forwards, dashFlow 1s linear infinite; }
    .conn-label-anim{ opacity:0; animation:fi 0.5s ease-out forwards; }
    .flow-dot{ opacity:0; animation:fi 0.3s ease-out forwards, dotMove 2s ease-in-out infinite; }
    @keyframes dotMove{ 0%{offset-distance:0%;} 100%{offset-distance:100%;} }
    @keyframes dashFlow{ 0%{stroke-dashoffset:0;} 100%{stroke-dashoffset:-9;} }
  </style>
  <rect width="776" height="665" fill="#ffffff"/>
  <g transform="translate(20, 20)">
  <rect x="1" y="1" width="734" height="623" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <!-- 横向泳道底纹 -->
  <rect x="0" y="49" width="736" height="192" fill="#F8FAFC" stroke="none"/>
  <rect x="0" y="241" width="736" height="256" fill="#F0F9FF" stroke="none"/>
