<svg width="100%" viewBox="0 0 720 550" xmlns="http://www.w3.org/2000/svg" style="background-color: white;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #444441; }
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    
    /* 动画样式 */
    .swim-lane {
      opacity: 0;
      animation: fadeIn 0.4s ease-out forwards;
    }
    .lane-header {
      opacity: 0;
      transform-origin: center;
      animation: popIn 0.4s ease-out forwards;
    }
    .process-step {
      opacity: 0;
      transform-origin: center;
      animation: popIn 0.4s ease-out forwards;
    }
    .connector-line {
      opacity: 0;
      animation: fadeIn 0.3s ease-out forwards;
    }
    .legend-item {
      opacity: 0;
      animation: fadeIn 0.3s ease-out forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</defs>

<text class="th" x="360" y="24" text-anchor="middle" dominant-baseline="central" font-size="15">泳道图模板 - 采购审批流程</text>

<!-- 泳道背景 -->
<rect class="swim-lane" x="20" y="44" width="130" height="480" fill="#F8F7F4" stroke="#E0DFDA" stroke-width="1" style="animation-delay: 0s"/>
<rect class="swim-lane" x="150" y="44" width="130" height="480" fill="#F0F7FF" stroke="#E0DFDA" stroke-width="1" style="animation-delay: 0.1s"/>
<rect class="swim-lane" x="280" y="44" width="130" height="480" fill="#F0FDF7" stroke="#E0DFDA" stroke-width="1" style="animation-delay: 0.2s"/>
<rect class="swim-lane" x="410" y="44" width="130" height="480" fill="#F5F3FF" stroke="#E0DFDA" stroke-width="1" style="animation-delay: 0.3s"/>
<rect class="swim-lane" x="540" y="44" width="140" height="480" fill="#FFFAF0" stroke="#E0DFDA" stroke-width="1" style="animation-delay: 0.4s"/>

<!-- 分隔线 -->
<line class="connector-line" x1="150" y1="44" x2="150" y2="524" stroke="#E0DFDA" stroke-width="1" style="animation-delay: 0.5s"/>
<line class="connector-line" x1="280" y1="44" x2="280" y2="524" stroke="#E0DFDA" stroke-width="1" style="animation-delay: 0.5s"/>
<line class="connector-line" x1="410" y1="44" x2="410" y2="524" stroke="#E0DFDA" stroke-width="1" style="animation-delay: 0.5s"/>
<line class="connector-line" x1="540" y1="44" x2="540" y2="524" stroke="#E0DFDA" stroke-width="1" style="animation-delay: 0.5s"/>

<!-- 泳道标题 -->
<g class="c-gray lane-header" style="animation-delay: 0.6s"><rect x="35" y="54" width="100" height="32" rx="16" stroke-width="0.5"/>
  <text class="ts" x="85" y="70" text-anchor="middle" dominant-baseline="central">👤 申请人</text></g>
<g class="c-blue lane-header" style="animation-delay: 0.7s"><rect x="165" y="54" width="100" height="32" rx="16" stroke-width="0.5"/>
  <text class="ts" x="215" y="70" text-anchor="middle" dominant-baseline="central">💻 采购系统</text></g>
<g class="c-teal lane-header" style="animation-delay: 0.8s"><rect x="295" y="54" width="100" height="32" rx="16" stroke-width="0.5"/>
  <text class="ts" x="345" y="70" text-anchor="middle" dominant-baseline="central">👔 部门经理</text></g>
<g class="c-purple lane-header" style="animation-delay: 0.9s"><rect x="425" y="54" width="100" height="32" rx="16" stroke-width="0.5"/>
  <text class="ts" x="475" y="70" text-anchor="middle" dominant-baseline="central">💼 财务部门</text></g>
<g class="c-amber lane-header" style="animation-delay: 1s"><rect x="560" y="54" width="100" height="32" rx="16" stroke-width="0.5"/>
  <text class="ts" x="610" y="70" text-anchor="middle" dominant-baseline="central">📦 供应商</text></g>

<!-- 流程步骤：按流程顺序显示 -->
<!-- 步骤1: 填写申请 -->
<g class="c-gray process-step" style="animation-delay: 1.2s"><rect x="35" y="110" width="100" height="44" rx="6" stroke-width="0.8"/>
  <text class="ts" x="85" y="125" text-anchor="middle" dominant-baseline="central">填写采购申请</text>
  <text class="ts" x="85" y="141" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#666">商品/数量/预算</text></g>

<!-- 步骤2: 提交申请 -->
<g class="c-gray process-step" style="animation-delay: 1.4s"><rect x="35" y="180" width="100" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="85" y="198" text-anchor="middle" dominant-baseline="central">提交申请</text></g>

<!-- 步骤3: 系统校验 -->
<g class="c-blue process-step" style="animation-delay: 1.6s"><rect x="165" y="176" width="100" height="44" rx="6" stroke-width="0.8"/>
  <text class="ts" x="215" y="191" text-anchor="middle" dominant-baseline="central">校验申请信息</text>
  <text class="ts" x="215" y="207" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#666">格式/预算/库存</text></g>

<!-- 步骤4: 部门经理审批 -->
<g class="c-teal process-step" style="animation-delay: 1.8s"><rect x="295" y="176" width="100" height="44" rx="6" stroke-width="0.8"/>
  <text class="ts" x="345" y="191" text-anchor="middle" dominant-baseline="central">审批申请</text>
  <text class="ts" x="345" y="207" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#666">业务合理性</text></g>

<!-- 步骤5: 财务审批 -->
<g class="c-purple process-step" style="animation-delay: 2s"><rect x="425" y="176" width="100" height="44" rx="6" stroke-width="0.8"/>
  <text class="ts" x="475" y="191" text-anchor="middle" dominant-baseline="central">预算审核</text>
  <text class="ts" x="475" y="207" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#666">资金/成本</text></g>

<!-- 步骤6: 生成采购单 -->
<g class="c-blue process-step" style="animation-delay: 2.2s"><rect x="165" y="250" width="100" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="215" y="268" text-anchor="middle" dominant-baseline="central">生成采购订单</text></g>

<!-- 步骤7: 发送给供应商 -->
<g class="c-blue process-step" style="animation-delay: 2.4s"><rect x="165" y="310" width="100" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="215" y="328" text-anchor="middle" dominant-baseline="central">发送订单</text></g>

<!-- 步骤8: 供应商确认 -->
<g class="c-amber process-step" style="animation-delay: 2.6s"><rect x="560" y="306" width="100" height="44" rx="6" stroke-width="0.8"/>
  <text class="ts" x="610" y="321" text-anchor="middle" dominant-baseline="central">确认订单</text>
  <text class="ts" x="610" y="337" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#666">交期/价格确认</text></g>

<!-- 步骤9: 发货 -->
<g class="c-amber process-step" style="animation-delay: 2.8s"><rect x="560" y="380" width="100" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="610" y="398" text-anchor="middle" dominant-baseline="central">发货</text></g>

<!-- 步骤10: 入库 -->
<g class="c-blue process-step" style="animation-delay: 3s"><rect x="165" y="380" width="100" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="215" y="398" text-anchor="middle" dominant-baseline="central">入库验收</text></g>

<!-- 步骤11: 通知申请人 -->
<g class="c-blue process-step" style="animation-delay: 3.2s"><rect x="165" y="440" width="100" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="215" y="458" text-anchor="middle" dominant-baseline="central">通知申请人</text></g>

<!-- 步骤12: 确认收货 -->
<g class="c-gray process-step" style="animation-delay: 3.4s"><rect x="35" y="440" width="100" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="85" y="458" text-anchor="middle" dominant-baseline="central">确认收货</text></g>

<!-- 拒绝分支 -->
<g class="c-teal process-step" style="animation-delay: 2.1s"><rect x="295" y="250" width="100" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="345" y="268" text-anchor="middle" dominant-baseline="central">拒绝申请</text></g>
<g class="c-gray process-step" style="animation-delay: 2.3s"><rect x="560" y="250" width="100" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="610" y="268" text-anchor="middle" dominant-baseline="central">查看拒绝原因</text></g>

<!-- 连接线 -->
<line class="connector-line" x1="85" y1="154" x2="85" y2="180" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 1.3s"/>
<line class="connector-line" x1="135" y1="198" x2="165" y2="198" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 1.5s"/>
<line class="connector-line" x1="265" y1="198" x2="295" y2="198" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 1.7s"/>
<line class="connector-line" x1="395" y1="198" x2="425" y2="198" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 1.9s"/>
<line class="connector-line" x1="475" y1="220" x2="475" y2="240" stroke="#888780" stroke-width="1.5" style="animation-delay: 2.1s"/>
<line class="connector-line" x1="475" y1="240" x2="215" y2="240" stroke="#888780" stroke-width="1.5" style="animation-delay: 2.1s"/>
<line class="connector-line" x1="215" y1="240" x2="215" y2="250" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.1s"/>
<line class="connector-line" x1="215" y1="286" x2="215" y2="310" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.3s"/>
<line class="connector-line" x1="265" y1="328" x2="560" y2="328" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.5s"/>
<line class="connector-line" x1="610" y1="350" x2="610" y2="380" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.7s"/>
<line class="connector-line" x1="560" y1="398" x2="265" y2="398" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.9s"/>
<line class="connector-line" x1="215" y1="416" x2="215" y2="440" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 3.1s"/>
<line class="connector-line" x1="165" y1="458" x2="135" y2="458" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 3.3s"/>

<!-- 拒绝分支连线 -->
<line class="connector-line" x1="345" y1="220" x2="345" y2="250" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.15s"/>
<line class="connector-line" x1="395" y1="268" x2="560" y2="268" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" style="animation-delay: 2.25s"/>

<!-- 图例 -->
<line class="connector-line" x1="40" y1="535" x2="680" y2="535" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" stroke-opacity="0.35" style="animation-delay: 3.5s"/>
<text class="ts legend-item" x="360" y="550" text-anchor="middle" dominant-baseline="central" fill="#666" style="animation-delay: 3.6s">泳道图：按角色/系统划分，展示跨部门协作流程</text>

</svg>
