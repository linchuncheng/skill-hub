  <!-- 图例 -->
  <line x1="702" y1="15.0" x2="726" y2="15.0" stroke="#3b82f6" stroke-width="1.3" marker-end="url(#arrow-sync)" class="conn-line" style="animation-delay:0.05s"/>
  <circle r="2" fill="url(#glow-sync)" class="flow-dot" style="offset-path:path('M 702 15.0 L 726 15.0');animation-delay:0.35s,0.35s"/>
