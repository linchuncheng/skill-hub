server:
  port: 8001

spring:
  application:
    name: your_group_name-auth
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-open-prepared-statements: 20
      connection-init-sqls: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.your_group_name.your_project_name.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: your_group_name-jwt-secret-key-for-signing-tokens-minimum-256-bits-required
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

# 日志
logging:
  level:
    root: INFO
    com.your_group_name.your_project_name: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
