# ========================================
# Auth 服务 - 本地开发环境
# 中间件: Docker 本地启动
# ========================================

# Nacos 配置中心
nacos:
  config:
    server-addr: ${configAddr:localhost:8848}
    namespace: ${configNamespace:}
    group: DEFAULT_GROUP
    type: yaml
    data-ids: your_group_name-common.yml,your_group_name-auth.yml
    auto-refresh: true
    bootstrap:
      enable: true
      log-enable: true

# 数据库 (Docker 本地 MySQL)
spring:
  datasource:
    druid:
      url: jdbc:mysql://localhost:3306/your_group_name?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      username: root
      password: 123456

# Redis (Docker 本地 Redis)
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
