# ========================================
# Platform 服务 - 本地开发环境
# 中间件: Docker 本地启动
# ========================================

# 注意：本地开发不需要Nacos配置中心，所有配置直接写在本文件中

# 数据库 (Docker 本地 MySQL)
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fengqun?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456

# Redis (Docker 本地 Redis)
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
