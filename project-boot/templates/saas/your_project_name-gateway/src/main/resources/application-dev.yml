# ========================================
# Gateway 服务 - 本地开发环境
# 中间件: Docker 本地启动
# ========================================

# Nacos 配置中心
nacos:
  config:
    server-addr: ${configAddr:localhost:8848}
    namespace: ${configNamespace:}
    group: DEFAULT_GROUP
    type: yaml
    data-ids: your_group_name-common.yml,your_group_name-gateway.yml
    auto-refresh: true
    bootstrap:
      enable: true
      log-enable: true

# 路由配置 - 本地直连
gateway:
  routes:
    - id: your_project_name-auth
      uri: http://localhost:8001
      predicates:
        - Path=/api/auth/**
      auth-required: false
    - id: your_project_name-platform
      uri: http://localhost:8082
      predicates:
        - Path=/api/platform/**
    - id: your_project_name-server
      uri: http://localhost:8083
      predicates:
        - Path=/api/your_project_name/**