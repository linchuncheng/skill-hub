server:
  port: 8082

spring:
  application:
    name: your_group_name-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      connection-init-sqls: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.your_group_name.your_project_name.platform.entity

# JWT 配置
jwt:
  secret: your_group_name-jwt-secret-key-for-signing-tokens-minimum-256-bits-required
