# ============================================================================
# RocketMQ Broker 配置文件
# ============================================================================

# Broker 所属集群名称，同一集群内的 Broker 具有相同的集群名称
brokerClusterName=DefaultCluster

# Broker 名称，同一集群内的 Broker 具有不同的 Broker 名称
brokerName=broker-a

# Broker ID，0 为主节点，>0 为从节点
brokerId=0

# 是否从 NameServer 定期删除过期的 Topic
deleteWhen=04

# 在同一个 JVM 进程内，一个实例化的 DefaultMQProducer、DefaultMQPushConsumer、DefaultMQPullConsumer 承载的 Queue 的个数，默认是 4
fileReservedTime=72

# brokerIP1 配置
# 注释掉让系统自动检测，避免 Docker 环境中的网络问题
# brokerIP1=你的宿主机IP

# brokerIP1
# 默认值为 InetAddress.getLocalHost().getHostName()

# 存储路径
storePathRootDir=/home/rocketmq/data/store

# commitLog 存储路径
storePathCommitLog=/home/rocketmq/data/store/commitlog

# 消费队列存储路径
storePathConsumeQueue=/home/rocketmq/data/store/consumequeue

# 消息索引存储路径
storePathIndex=/home/rocketmq/data/store/index

# checkpoint 文件存储路径
storePathCheckpoint=/home/rocketmq/data/store/checkpoint

# abort 文件存储路径
abortFile=/home/rocketmq/data/store/abort

# 延迟消息偏移量存储路径 (修复 NullPointerException)
storePathDelayOffset=/home/rocketmq/data/store/delayoffset
delayOffsetStorePath=/home/rocketmq/data/store/delayoffset

# 限制的消息大小
maxMessageSize=65536

# 是否开启 rebalance 时的异步通知
flushIntervalConsumeQueue=1000

# 是否开启 commitLog 的异步刷盘
flushCommitLogTimed=false

# commitLog 的异步刷盘间隔时间，单位为毫秒
flushIntervalCommitLog=500

# 一次刷盘最多刷多少页
flushConsumeQueueLeastPages=2

# consumeQueue 刷盘的最小间隔时间
flushConsumeQueueThoroughInterval=60000

# commitLog 刷盘的最小间隔时间
flushCommitLogLeastPages=4

# commitLog 刷盘的最大间隔时间
flushCommitLogThoroughInterval=10000

# 删除物理队列中未消费的数据库时是否立即删除
deleteCommitLogFilesInterval=100

# 删除消费队列时的间隔时间
deleteConsumeQueueFilesInterval=100

# NameServer 地址
namesrvAddr=rocketmq-namesrv:9876

# Broker 对外服务的监听端口
listenPort=10911

# 是否需要通知所有 Broker，默认值为 true
sendThreadPoolQueueCapacity=10000

# 是否需要一个 CommitLog 的线程来异步 handleDiskFlush，默认值为 true
maxPullConsumerNumPerGroup=32000

# 是否支持长轮询，默认值为 false，开启长轮询后，消费者会持久化连接，提高实时性
longPollingEnable=true

# 消息轮询机制中，一批消息中是否需要有 TagCode
notifyConsumerIdsChangedEnable=true

# 高可用开关，由于需要保证消息可靠，建议打开
highAvailableClusterTopicEnable=true

# Broker 的角色
# - ASYNC_MASTER 异步复制 Master
# - SYNC_MASTER 同步复制 Master
# - SLAVE 从节点
brokerRole=ASYNC_MASTER

# 消息的刷盘模式
# - ASYNC_FLUSH 异步刷盘
# - SYNC_FLUSH 同步刷盘
flushDiskType=ASYNC_FLUSH

# 设定 Broker 节点间心跳检测间隔时间，单位毫秒
haSendHeartbeatInterval=5000

# 设定 Broker 节点间心跳超时时间，单位毫秒
haHithbeatTimeout=15000

# 定时检测 syncStateSet 中每个副本的 commitLogMaxOffset 和 consumeQueueMaxOffset，该参数用于定时触发前面所说的事件，单位毫秒
checkSyncStateSetEachSyncStateSetOrphanInterval=5000

# Broker 是否监听 SLAVE -> MASTER 的重定向请求
brokerFastFailureEnable=true

# 主从同步过程中是否采用 sendfile 方式传送 commitlog 文件的部分内容
transferMsgByHeap=true

# 主从同步过程中一次传输多少个页
maxHATransferBytesinOneTransfer=32768

# Broker 是否 commit/roll back 一条消息到 CommitLog 中
useReentrantLockWhenPutMessage=false

# 生产者的最大连接数量，建议值是 16
producerMaxConnectionNums=32

# 消费者的最大连接数量，建议值是 32
consumerMaxConnectionNums=32

# 轻量级消息队列的最大数量
lightweightTopicNum=1000

# 是否由 TransactionStateService 负责将状态为 NOT_OP 的准备好的消息进行 roll back 到原队列
isDefaultTopicHasBrokerAcl=false

# 是否由 TransactionStateService 负责将状态为 NOT_OP 的准备好的消息进行 roll back 到原队列
waitTimeMillsInTransactionQueue=1000
